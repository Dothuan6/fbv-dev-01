<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FBV.ONE — Lời mời kết bạn</title>
<link rel="stylesheet" href="assets/css/styles.css" />
<link rel="stylesheet" href="assets/css/friend-requests.css" />
</head>
<body class="app-body">
  <div class="app-screen">

    <!-- Header -->
    <header class="fr-header">
      <button class="back" aria-label="Quay lại" onclick="location.href='contacts.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="ttl">Lời mời kết bạn</div>
    </header>

    <!-- Tabs -->
    <div class="fr-tabs">
      <div class="fr-tab" onclick="showTab('received',this)">Đã nhận (2)</div>
      <div class="fr-tab active" onclick="showTab('sent',this)">Đã gửi (3)</div>
    </div>

    <!-- Đã nhận -->
    <div class="panel" id="received">
      <div class="fr-item">
        <div class="avatar av-plus-blue">RN</div>
        <div class="meta"><div class="nm">rtetetet</div><div class="sub">Muốn kết bạn với bạn</div></div>
        <div class="fr-actions">
          <button class="btn-reject" onclick="respond(this,'Đã từ chối')">Từ chối</button>
          <button class="btn-accept" onclick="respond(this,'Bạn bè')">Chấp nhận</button>
        </div>
      </div>
      <div class="fr-item">
        <div class="avatar av-land"><svg viewBox="0 0 24 24" fill="#fff" opacity=".9"><path d="M4 18l4-5 3 3 4-6 5 8z"/><circle cx="8" cy="8" r="2"/></svg></div>
        <div class="meta"><div class="nm">Change name55</div><div class="sub">Muốn kết bạn với bạn</div></div>
        <div class="fr-actions">
          <button class="btn-reject" onclick="respond(this,'Đã từ chối')">Từ chối</button>
          <button class="btn-accept" onclick="respond(this,'Bạn bè')">Chấp nhận</button>
        </div>
      </div>
    </div>

    <!-- Đã gửi -->
    <div class="panel active" id="sent">
      <div class="fr-item">
        <div class="avatar av-land"><svg viewBox="0 0 24 24" fill="#fff" opacity=".9"><path d="M4 18l4-5 3 3 4-6 5 8z"/><circle cx="8" cy="8" r="2"/></svg></div>
        <div class="meta"><div class="nm">[2.HOÀNG TÚ]</div><div class="sub">Có thể kết bạn</div></div>
        <button class="btn-revoke" onclick="revoke(this)">Thu hồi</button>
      </div>
      <div class="fr-item">
        <div class="avatar av-plus-blue">+</div>
        <div class="meta"><div class="nm">+84966613625</div><div class="sub">Có thể kết bạn</div></div>
        <button class="btn-revoke" onclick="revoke(this)">Thu hồi</button>
      </div>
      <div class="fr-item">
        <div class="avatar av-plus-gray">+</div>
        <div class="meta"><div class="nm">+84912345678</div><div class="sub">Có thể kết bạn</div></div>
        <button class="btn-revoke" onclick="revoke(this)">Thu hồi</button>
      </div>
    </div>

  </div>

<script src="assets/js/friend-requests.js"></script>
</body>
</html>
