<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FBV.ONE — Bản tin</title>
<link rel="stylesheet" href="assets/css/styles.css" />
<link rel="stylesheet" href="assets/css/app-feed.css" />
</head>
<body>
  <div class="shell">

    <!-- Rail -->
    <nav class="rail">
      <div class="me" title="Cá nhân" onclick="openAccountModal()">R</div>
      <div class="nav" title="Tin nhắn" onclick="location.href='app.html'"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h16v12H7l-3 3z"/></svg></div>
      <div class="nav" title="Danh bạ" onclick="location.href='app-contacts.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.5"/><path d="M2.5 20c0-3.6 2.9-5.5 6.5-5.5s6.5 1.9 6.5 5.5"/><path d="M16 5a3.5 3.5 0 010 6"/><path d="M18 14.5c2.6.4 4 2 4 5.5"/></svg></div>
      <div class="nav active" title="Bản tin"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9 15l1.5-4.5L15 9l-1.5 4.5z" fill="currentColor" stroke="none"/></svg></div>
      <div class="spacer"></div>
      <div class="nav" title="Cài đặt" onclick="openSettingsModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 13a7.9 7.9 0 000-2l2-1.5-2-3.4-2.3 1a8 8 0 00-1.7-1l-.3-2.6h-4l-.3 2.6a8 8 0 00-1.7 1l-2.3-1-2 3.4L4.6 11a7.9 7.9 0 000 2l-2 1.5 2 3.4 2.3-1a8 8 0 001.7 1l.3 2.6h4l.3-2.6a8 8 0 001.7-1l2.3 1 2-3.4z"/></svg></div>
    </nav>

    <!-- Bản tin -->
    <div class="feed-wrap">
      <div class="feed">
        <div class="feed-head">Bản tin</div>

        <!-- Soạn nhanh -->
        <div class="card composer">
          <div class="cp-row">
            <div class="av">R</div>
            <div class="cp-prompt" onclick="openCompose()">Hôm nay bạn thế nào?</div>
          </div>
          <div class="cp-actions">
            <button class="cp-btn cp-photo" onclick="openCompose()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="2"/><path d="M5 19l5-5 3 3 3-3 3 3"/></svg>Ảnh</button>
            <button class="cp-btn cp-video" onclick="openCompose()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="13" height="12" rx="2"/><path d="M16 10l5-3v10l-5-3z"/></svg>Video</button>
          </div>
        </div>

        <div id="postList"></div>
      </div>
    </div>

  </div>

  <!-- Menu bài đăng -->
  <div class="pop" id="postMenu">
    <div class="it" onclick="closePop()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 018 0"/></svg>Chỉnh sửa quyền xem<span class="chev">›</span></div>
    <div class="it" onclick="closePop()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/></svg>Chỉnh sửa bài đăng<span class="chev">›</span></div>
    <div class="it danger" onclick="deletePost()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M9 7V4h6v3"/><path d="M6 7l1 13h10l1-13"/></svg>Xóa bài đăng</div>
  </div>

  <!-- Modal soạn bài -->
  <div class="modal-overlay" id="composeOverlay">
    <div class="modal">
      <div class="mh">
        <button class="x" onclick="closeCompose()">&times;</button>
        <div class="priv"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><circle cx="16" cy="8" r="3"/><path d="M2 19c0-3 2.5-4.5 5.5-4.5"/><path d="M22 19c0-3-2.5-4.5-5.5-4.5"/></svg>Tất cả bạn bè ▾</div>
        <button class="post-btn" id="postBtn" onclick="publish()">Đăng</button>
      </div>
      <textarea id="composeText" placeholder="Bạn đang nghĩ gì?" oninput="onType()"></textarea>
      <div class="mtools">
        <div class="t cp-photo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="2"/><path d="M5 19l5-5 3 3 3-3 3 3"/></svg>Ảnh</div>
        <div class="t cp-video"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="13" height="12" rx="2"/><path d="M16 10l5-3v10l-5-3z"/></svg>Video</div>
      </div>
    </div>
  </div>

<script src="assets/js/app-feed.js"></script>
<script src="assets/js/account-modal.js"></script>
<script src="assets/js/desktop-modals.js"></script>
</body>
</html>
