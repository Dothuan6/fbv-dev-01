<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FBV.ONE — Tùy chọn</title>
<link rel="stylesheet" href="assets/css/styles.css" />
<link rel="stylesheet" href="assets/css/group-manage.css" />
</head>
<body class="gm-body">
  <div class="gm-screen">

    <!-- Header -->
    <header class="gm-header">
      <button class="back" aria-label="Quay lại" onclick="window.location.href='group-chat.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="ttl">Tùy chọn</div>
    </header>

    <div class="gm-content">

      <!-- Avatar + tên nhóm -->
      <div class="gm-top">
        <div class="gm-ava">
          <span id="gmAvChar">T</span>
          <div class="cam"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 8h3l1.5-2h5L16 8h3a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2v-8a2 2 0 012-2z"/><circle cx="12" cy="13" r="3"/></svg></div>
        </div>
        <div class="gm-name">
          <span id="gmName">Test</span>
          <span class="edit" onclick="openRename()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/></svg></span>
        </div>
      </div>

      <!-- Hàng nút hành động -->
      <div class="gm-actions">
        <button onclick="location.href='group-chat.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.5 8.5 0 01-12.4 7.5L3 21l2-5.6A8.5 8.5 0 1121 11.5z"/></svg>
          Nhắn tin
        </button>
        <button onclick="location.href='call.html?type=voice&name=Test'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 4c.5 0 1 .3 1.2.8l1.2 2.8c.2.5.1 1-.3 1.4l-1.3 1.3c1 2 2.6 3.6 4.6 4.6l1.3-1.3c.4-.4.9-.5 1.4-.3l2.8 1.2c.5.2.8.7.8 1.2v2.8c0 .8-.7 1.5-1.5 1.4C9.6 19.6 4.4 14.4 4 6.5 3.9 5.7 4.6 5 5.4 5z"/></svg>
          Gọi thoại
        </button>
        <button onclick="location.href='call.html?type=video&name=Test'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="13" height="12" rx="2"/><path d="M16 10l5-3v10l-5-3z"/></svg>
          Gọi video
        </button>
        <button onclick="this.classList.toggle('on')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 00-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg>
          Tắt âm
        </button>
        <button id="moreBtn" onclick="toggleMore(event)">
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
          Thêm
        </button>
      </div>

      <!-- Menu "Thêm" -->
      <div class="gm-more" id="gmMore">
        <div class="it" onclick="closeMore()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M9 7V4h6v3"/><path d="M6 7l1 13h10l1-13"/></svg>
          Xoá tin nhắn
        </div>
        <div class="it danger" onclick="if(confirm('Rời khỏi nhóm này?')) location.href='messages.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Rời nhóm
        </div>
        <div class="it danger" onclick="if(confirm('Giải tán nhóm? Hành động này không thể hoàn tác.')) location.href='messages.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.5"/><path d="M2.5 20c0-3.6 2.9-5.5 6.5-5.5 1.2 0 2.3.2 3.2.6"/><line x1="16" y1="9" x2="22" y2="15"/><line x1="22" y1="9" x2="16" y2="15"/></svg>
          Giải tán nhóm
        </div>
      </div>

      <!-- Tabs -->
      <div class="gm-tabs">
        <span class="gm-tab active" onclick="showTab('members',this)">Thành viên</span>
        <span class="gm-tab" onclick="showTab('media',this)">Phương tiện</span>
        <span class="gm-tab" onclick="showTab('links',this)">Liên kết</span>
        <span class="gm-tab" onclick="showTab('files',this)">Tệp</span>
      </div>

      <!-- Panel: Thành viên -->
      <div class="gm-panel active" id="members">
        <div class="gm-addrow" onclick="location.href='group-add-member.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.5"/><path d="M2.5 20c0-3.6 2.9-5.5 6.5-5.5 1.2 0 2.3.2 3.2.6"/><path d="M19 8v6M16 11h6"/></svg>
          Thêm người
        </div>
        <div id="gmMemList"></div>
      </div>

      <!-- Panel: Phương tiện -->
      <div class="gm-panel" id="media">
        <div class="gm-grid">
          <div class="m" style="background:linear-gradient(135deg,#8bd17c,#4a8f3c)"></div>
          <div class="m" style="background:#1f2630"></div>
          <div class="m" style="background:#9aa3ad"></div>
        </div>
      </div>

      <!-- Panel: Liên kết -->
      <div class="gm-panel" id="links"><div class="gm-empty">Chưa có liên kết được chia sẻ</div></div>

      <!-- Panel: Tệp -->
      <div class="gm-panel" id="files"><div class="gm-empty">Chưa có tệp được chia sẻ</div></div>

    </div>
  </div>

  <!-- Sheet: Đổi tên nhóm -->
  <div class="sheet-overlay" id="rnOverlay" onclick="closeRename()"></div>
  <div class="sheet gm-rename" id="rnSheet">
    <h3>Đổi tên nhóm</h3>
    <div class="rn-body">
      <input type="text" id="rnInput" value="Test" />
      <button class="rn-save" onclick="saveRename()">Lưu</button>
    </div>
  </div>

  <!-- Sheet: Tùy chọn thành viên -->
  <div class="sheet-overlay" id="memOverlay" onclick="closeMemMenu()"></div>
  <div class="sheet gm-memsheet" id="memSheet">
    <div class="ms-head"><div class="av" id="msAv"></div><div class="nm" id="msName"></div></div>
    <div class="ms-it" onclick="viewProfile()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-6 8-6s8 2 8 6"/></svg>
      Trang cá nhân
    </div>
    <div class="ms-it" id="msPromote" onclick="promoteMember()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 3v5c0 4.5-3.2 7.8-8 9-4.8-1.2-8-4.5-8-9V6z"/><path d="M9 12l2 2 4-4"/></svg>
      <span id="msPromoteLbl">Bổ nhiệm phó nhóm</span>
    </div>
    <div class="ms-it danger" onclick="removeMember()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="4"/><path d="M2 21c0-4 3.1-6 7-6 1 0 2 .1 2.8.4"/><line x1="16" y1="11" x2="22" y2="11"/></svg>
      Xoá khỏi nhóm
    </div>
    <div class="ms-it cancel" onclick="closeMemMenu()">Huỷ</div>
  </div>

<script src="assets/js/toast.js"></script>
<script src="assets/js/group-manage.js"></script>
</body>
</html>
