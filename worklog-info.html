<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FBV.ONE — Nhật ký làm việc</title>
<link rel="stylesheet" href="styles.css" />
<style>
  .wi-body{background:var(--bg-base);min-height:100vh;display:flex;justify-content:center}
  .wi-screen{width:100%;max-width:480px;min-height:100vh;background:var(--bg-base);display:flex;flex-direction:column}

  .wi-header{background:var(--header-gradient);color:#fff;display:flex;align-items:center;gap:16px;padding:14px var(--screen-padding)}
  .wi-header .back{background:none;border:none;cursor:pointer;color:#fff;display:flex;padding:0}
  .wi-header .back svg{width:26px;height:26px}
  .wi-header .ttl{font-size:20px;font-weight:700}

  .wi-content{flex:1;padding:24px var(--screen-padding)}
  .wi-title{text-align:center;font-size:22px;font-weight:700;color:var(--text-primary);margin-bottom:14px}
  .wi-desc{text-align:center;font-size:17px;line-height:1.5;color:var(--text-secondary);margin-bottom:22px}

  .wi-btn{width:100%;height:54px;border:1px solid var(--border);border-radius:28px;background:var(--primary);color:#fff;font-size:17px;font-weight:400;cursor:pointer;margin-bottom:24px}

  .media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .media-grid .m{aspect-ratio:1/1;border-radius:10px;background:#9aa3ad;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .media-grid .m svg{width:46%;height:46%;color:#fff}
  .media-grid .m.contact{background:var(--surface-field);flex-direction:column;gap:6px;color:var(--text-secondary);font-size:12px;padding:8px;text-align:center}
  .media-grid .m.contact .pl{width:30px;height:30px;border-radius:50%;background:#5B6470;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px}
</style>
</head>
<body class="wi-body">
  <div class="wi-screen">

    <!-- Header -->
    <header class="wi-header">
      <button class="back" aria-label="Quay lại" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="ttl">Nhật ký làm việc</div>
    </header>

    <div class="wi-content">
      <div class="wi-title">Nhật ký làm việc</div>
      <div class="wi-desc">Lưu trữ và truy cập nhanh những nội dung quan trọng bạn đã gửi trong nhật ký làm việc</div>

      <button class="wi-btn">Phương tiện</button>

      <!-- Lưới phương tiện -->
      <div class="media-grid">
        <div class="m"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1c-1 .1-2.1.6-2.8 1.4-.6.7-1.1 1.7-.9 2.7 1 .1 2.1-.5 2.8-1.2.6-.7 1.1-1.7.9-2.9zM20.5 17.2c-.5 1.2-.8 1.8-1.5 2.9-1 1.5-2.4 3.5-4.1 3.5-1.5 0-1.9-1-4-1-2 0-2.5 1-4 1-1.7 0-3-1.8-4-3.3C-.1 16.8-.4 11.8 1.3 9.2c1-1.6 2.7-2.6 4.3-2.6 1.6 0 2.6 1 3.9 1 1.3 0 2-1 3.9-1 1.4 0 2.9.8 3.9 2.1-3.4 1.9-2.9 6.8.9 8.5z"/></svg></div>
        <div class="m contact"><div class="pl">+</div>+84912345678</div>
        <div class="m contact"><div class="pl">+</div>+84912345678</div>
      </div>
    </div>
  </div>
</body>
</html>
