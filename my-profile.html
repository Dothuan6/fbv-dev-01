<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FBV.ONE — Trang cá nhân</title>
<link rel="stylesheet" href="styles.css" />
<style>
  .app-body{background:var(--bg-subtle)}
  .app-screen{background:var(--bg-subtle);position:relative}

  /* Header gradient hồ sơ */
  .mp-header{background:var(--header-gradient);color:#fff;padding:14px var(--screen-padding) 26px;text-align:center;position:relative}
  .mp-header .back{position:absolute;left:var(--screen-padding);top:14px;background:none;border:none;cursor:pointer;color:#fff;display:flex;padding:0}
  .mp-header .back svg{width:26px;height:26px}
  .mp-header .more{position:absolute;right:var(--screen-padding);top:18px;cursor:pointer;color:#fff;font-size:24px;line-height:1}
  .mp-avatar{width:120px;height:120px;border-radius:50%;margin:24px auto 14px;background:#5B6470;display:flex;align-items:center;justify-content:center;color:#fff;font-size:42px;font-weight:600}
  .mp-name{font-size:28px;font-weight:700}
  .mp-handle{font-size:18px;color:rgba(255,255,255,.85);margin-top:2px}

  .mp-scroll{flex:1;overflow-y:auto}

  .composer-card{background:#fff;padding:14px var(--screen-padding)}
  .cp-row{display:flex;align-items:center;gap:14px}
  .cp-row .avatar{width:48px;height:48px;border-radius:50%;background:#5B6470;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;flex:none}
  .cp-prompt{flex:1;background:var(--surface-field);border-radius:24px;padding:13px 18px;color:var(--text-secondary);font-size:17px;cursor:pointer}
  .cp-actions{display:flex;gap:14px;margin-top:14px}
  .cp-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:24px;font-size:17px;font-weight:600;cursor:pointer;border:none}
  .cp-btn svg{width:22px;height:22px}
  .cp-photo{background:#E8F1FE;color:var(--primary)}
  .cp-video{background:#F3EAFE;color:#7B2FF7}

  .post{background:#fff;margin-top:10px;padding:16px var(--screen-padding)}
  .post .ph{display:flex;align-items:center;gap:12px}
  .post .ph .av{width:46px;height:46px;border-radius:50%;background:#5B6470;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;flex:none}
  .post .ph .nm{font-size:17px;font-weight:600;color:var(--text-primary)}
  .post .ph .meta{font-size:14px;color:var(--text-secondary);display:flex;align-items:center;gap:5px}
  .post .ph .meta svg{width:15px;height:15px}
  .post .ph .more{margin-left:auto;cursor:pointer;color:var(--text-secondary);font-size:24px;line-height:1;padding:0 4px}
  .post .txt{font-size:17px;color:var(--text-primary);margin:12px 0}
  .post .media{position:relative;border-radius:14px;overflow:hidden;background:#d3d8de;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center}
  .post .media .play{width:64px;height:64px;border-radius:50%;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center}
  .post .media .play svg{width:30px;height:30px;color:#fff}
  .post .pfoot{display:flex;gap:28px;margin-top:14px;color:var(--text-secondary);font-size:17px}
  .post .pfoot .a{display:flex;align-items:center;gap:8px;cursor:pointer}
  .post .pfoot svg{width:23px;height:23px}

  .opt-item{display:flex;align-items:center;gap:14px;padding:18px var(--screen-padding);font-size:18px;color:var(--text-primary);cursor:pointer}
  .opt-item svg{width:24px;height:24px;flex:none;color:var(--text-secondary)}
  .opt-item .chev{margin-left:auto;color:var(--text-secondary)}
</style>
</head>
<body class="app-body">
  <div class="app-screen">

    <!-- Header -->
    <header class="mp-header">
      <button class="back" aria-label="Quay lại" onclick="location.href='account.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="more" onclick="openSheet()">&#8943;</div>
      <div class="mp-avatar">R</div>
      <div class="mp-name">rtetetet</div>
      <div class="mp-handle">@yase0</div>
    </header>

    <div class="mp-scroll">
      <!-- Soạn nhanh -->
      <div class="composer-card">
        <div class="cp-row">
          <div class="avatar">R</div>
          <div class="cp-prompt" onclick="location.href='create-post.html'">Hôm nay bạn thế nào?</div>
        </div>
        <div class="cp-actions">
          <button class="cp-btn cp-photo" onclick="location.href='create-post.html'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="2"/><path d="M5 19l5-5 3 3 3-3 3 3"/></svg>
            Ảnh
          </button>
          <button class="cp-btn cp-video" onclick="location.href='create-post.html'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="13" height="12" rx="2"/><path d="M16 10l5-3v10l-5-3z"/></svg>
            Video
          </button>
        </div>
      </div>

      <!-- Bài đăng của tôi -->
      <div class="post">
        <div class="ph">
          <div class="av">R</div>
          <div>
            <div class="nm">rtetetet</div>
            <div class="meta">10 giờ trước (đã chỉnh sửa)
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><circle cx="16" cy="8" r="3"/><path d="M2 19c0-3 2.5-4.5 5.5-4.5"/><path d="M22 19c0-3-2.5-4.5-5.5-4.5"/></svg>
            </div>
          </div>
          <div class="more" onclick="openSheet()">&#8943;</div>
        </div>
        <div class="txt">Video tets</div>
        <div class="media"><div class="play"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div></div>
        <div class="pfoot">
          <span class="a"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21C5 14.5 3 11 3 8a4.5 4.5 0 018-2.8A4.5 4.5 0 0121 8c0 3-2 6.5-9 13z"/></svg> Thích</span>
          <span class="a"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.5 8.5 0 01-12.4 7.5L3 21l2-5.6A8.5 8.5 0 1121 11.5z"/></svg> Bình luận</span>
        </div>
      </div>
    </div>

  </div>

  <!-- Sheet "..." -->
  <div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>
  <div class="sheet" id="optSheet">
    <div class="opt-item" onclick="location.href='edit-profile.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg>
      Thông tin cá nhân <span class="chev">›</span>
    </div>
  </div>

<script>
  function openSheet(){ document.getElementById('overlay').classList.add('show'); document.getElementById('optSheet').classList.add('show'); }
  function closeSheet(){ document.getElementById('overlay').classList.remove('show'); document.getElementById('optSheet').classList.remove('show'); }
</script>
</body>
</html>
