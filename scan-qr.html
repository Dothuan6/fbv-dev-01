<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FBV.ONE — Quét mã QR</title>
<link rel="stylesheet" href="assets/css/styles.css" />
<link rel="stylesheet" href="assets/css/scan-qr.css" />
</head>
<body class="qr-body">
  <div class="qr-screen">

    <!-- Header -->
    <header class="qr-header">
      <button class="back" aria-label="Quay lại" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="ttl">Quét mã QR</div>
    </header>

    <!-- Khung quét -->
    <div class="qr-view">
      <div class="qr-frame"><div class="qr-line"></div></div>
    </div>

    <div class="qr-hint">Hướng mã QR vào camera để quét</div>

  </div>
</body>
</html>
