<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FBV.ONE — Danh bạ</title>
<link rel="stylesheet" href="styles.css" />
<style>
  html,body{height:100%}
  .shell{display:flex;height:100vh;overflow:hidden;background:var(--bg-base)}

  /* Rail (giống app.html) */
  .rail{width:64px;flex:none;background:linear-gradient(180deg,#1565E0,#0A66FF);display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 0;color:#fff}
  .rail .me{width:44px;height:44px;border-radius:50%;background:#5B6470;margin-bottom:12px;display:flex;align-items:center;justify-content:center;font-weight:600;cursor:pointer}
  .rail .nav{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.85)}
  .rail .nav:hover{background:rgba(255,255,255,.14)}
  .rail .nav.active{background:rgba(255,255,255,.22);color:#fff}
  .rail .nav svg{width:26px;height:26px}
  .rail .spacer{flex:1}

  /* Cột menu danh bạ */
  .list-col{width:340px;flex:none;border-right:1px solid var(--border);display:flex;flex-direction:column;background:#fff}
  .lc-top{display:flex;align-items:center;gap:12px;padding:14px 16px}
  .lc-search{flex:1;display:flex;align-items:center;gap:8px;background:var(--surface-field);border-radius:20px;padding:8px 12px;color:var(--text-secondary)}
  .lc-search svg{width:18px;height:18px}
  .lc-search input{flex:1;border:none;background:transparent;outline:none;font-size:15px}
  .lc-top .ic{width:24px;height:24px;color:var(--text-primary);cursor:pointer}
  .nav-list{flex:1;overflow-y:auto;padding-top:6px}
  .nav-item{display:flex;align-items:center;gap:14px;padding:14px 18px;cursor:pointer;border-left:3px solid transparent}
  .nav-item:hover{background:var(--bg-subtle)}
  .nav-item.active{background:#E8F1FE;border-left-color:var(--primary)}
  .nav-item .ic2{width:40px;height:40px;border-radius:50%;background:var(--primary);flex:none;display:flex;align-items:center;justify-content:center;color:#fff}
  .nav-item .ic2 svg{width:22px;height:22px}
  .nav-item .t{flex:1;font-size:16px;color:var(--text-primary)}
  .nav-item .badge{background:#E5484D;color:#fff;font-size:12px;border-radius:10px;padding:1px 7px}

  /* Cột chính */
  .main-col{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg-subtle)}
  .mc-head{padding:16px 24px;background:#fff;border-bottom:1px solid var(--border)}
  .mc-head h2{font-size:18px;font-weight:700}
  .mc-body{flex:1;overflow-y:auto;padding:16px 24px}
  .panel{display:none}
  .panel.active{display:block}

  .card{background:#fff;border-radius:10px}
  .search-row{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);border-radius:20px;padding:9px 14px;color:var(--text-secondary);margin-bottom:16px;max-width:420px}
  .search-row svg{width:18px;height:18px}
  .search-row input{flex:1;border:none;outline:none;font-size:15px}

  .grp-label{font-size:14px;font-weight:700;color:var(--text-secondary);margin:14px 4px 4px}
  .frow{display:flex;align-items:center;gap:14px;padding:10px 14px;background:#fff;border-radius:8px;cursor:pointer}
  .frow:hover{background:var(--bg-subtle)}
  .frow .av{width:46px;height:46px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:13px}
  .frow .nm{flex:1;font-size:16px;color:var(--text-primary)}
  .frow .acts{display:none;gap:8px}
  .frow:hover .acts{display:flex}
  .frow .acts button{width:34px;height:34px;border:none;border-radius:50%;background:var(--surface-field);cursor:pointer;color:var(--text-secondary);display:flex;align-items:center;justify-content:center}
  .frow .acts button:hover{background:#E3EEFD;color:var(--primary)}
  .frow .acts svg{width:18px;height:18px}

  /* Lời mời kết bạn */
  .req-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px}
  .req-tab{padding:12px 0;margin-right:28px;font-size:16px;font-weight:600;color:var(--text-secondary);cursor:pointer;border-bottom:2px solid transparent}
  .req-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
  .req-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
  .req-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px}
  .req-card .top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .req-card .av{width:48px;height:48px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:13px}
  .req-card .nm{font-size:16px;font-weight:600;color:var(--text-primary)}
  .req-card .sub{font-size:13px;color:var(--text-secondary)}
  .req-card .btns{display:flex;gap:10px}
  .req-card .btns button{flex:1;border:none;border-radius:8px;padding:9px;font-size:15px;font-weight:600;cursor:pointer}
  .btn-reject{background:var(--surface-field);color:var(--text-primary)}
  .btn-accept{background:var(--primary);color:#fff}
  .btn-revoke{background:#fff;border:1px solid var(--border)!important;color:var(--text-primary)}
  .req-status{font-size:14px;color:var(--text-secondary);text-align:center;padding:9px}

  .empty{color:var(--text-secondary);text-align:center;padding:40px}

  @media (max-width:1023px){ .shell{display:none} }
</style>
</head>
<body>
  <div class="shell">

    <!-- Rail -->
    <nav class="rail">
      <div class="me" title="Cá nhân" onclick="openAccountModal()">R</div>
      <div class="nav" title="Tin nhắn" onclick="location.href='app.html'"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h16v12H7l-3 3z"/></svg></div>
      <div class="nav active" title="Danh bạ"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.5"/><path d="M2.5 20c0-3.6 2.9-5.5 6.5-5.5s6.5 1.9 6.5 5.5"/><path d="M16 5a3.5 3.5 0 010 6"/><path d="M18 14.5c2.6.4 4 2 4 5.5"/></svg></div>
      <div class="nav" title="Bản tin" onclick="location.href='app-feed.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9 15l1.5-4.5L15 9l-1.5 4.5z" fill="currentColor" stroke="none"/></svg></div>
      <div class="spacer"></div>
      <div class="nav" title="Cài đặt" onclick="openSettingsModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 13a7.9 7.9 0 000-2l2-1.5-2-3.4-2.3 1a8 8 0 00-1.7-1l-.3-2.6h-4l-.3 2.6a8 8 0 00-1.7 1l-2.3-1-2 3.4L4.6 11a7.9 7.9 0 000 2l-2 1.5 2 3.4 2.3-1a8 8 0 001.7 1l.3 2.6h4l.3-2.6a8 8 0 001.7-1l2.3 1 2-3.4z"/></svg></div>
    </nav>

    <!-- Cột menu -->
    <aside class="list-col">
      <div class="lc-top">
        <div class="lc-search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg><input placeholder="Tìm kiếm" /></div>
        <svg class="ic" onclick="openAddFriendModal()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.5"/><path d="M2.5 20c0-3.6 2.9-5.5 6.5-5.5 1.2 0 2.3.2 3.2.6"/><path d="M19 8v6M16 11h6"/></svg>
      </div>
      <div class="nav-list">
        <div class="nav-item active" onclick="showView('friends',this)">
          <span class="ic2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg></span>
          <span class="t">Danh sách bạn bè</span>
        </div>
        <div class="nav-item" onclick="showView('groups',this)">
          <span class="ic2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="9" r="3"/><circle cx="16" cy="9" r="3"/><path d="M2 20c0-3.3 2.7-5 6-5"/><path d="M14 15.2c2.6.4 4.5 2 4.5 4.8"/></svg></span>
          <span class="t">Danh sách nhóm</span>
        </div>
        <div class="nav-item" onclick="showView('requests',this)">
          <span class="ic2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.5"/><path d="M2.5 20c0-3.6 2.9-5.5 6.5-5.5 1.2 0 2.3.2 3.2.6"/><path d="M19 8v6M16 11h6"/></svg></span>
          <span class="t">Lời mời kết bạn</span>
          <span class="badge">2</span>
        </div>
      </div>
    </aside>

    <!-- Cột chính -->
    <section class="main-col">
      <div class="mc-head"><h2 id="viewTitle">Danh sách bạn bè</h2></div>
      <div class="mc-body">

        <!-- Bạn bè -->
        <div class="panel active" id="friends">
          <div class="search-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg><input placeholder="Tìm bạn" oninput="filterFriends(this.value)" /></div>
          <div id="friendList"></div>
        </div>

        <!-- Nhóm -->
        <div class="panel" id="groups"><div id="groupList"></div></div>

        <!-- Lời mời -->
        <div class="panel" id="requests">
          <div class="req-tabs">
            <span class="req-tab active" onclick="reqTab('recv',this)">Đã nhận (2)</span>
            <span class="req-tab" onclick="reqTab('sent',this)">Đã gửi (3)</span>
          </div>
          <div class="req-grid" id="reqRecv"></div>
          <div class="req-grid" id="reqSent" style="display:none"></div>
        </div>

      </div>
    </section>

  </div>

<script>
  if(window.innerWidth < 1024) location.replace('contacts.html');
  window.addEventListener('resize', function(){ if(window.innerWidth < 1024) location.replace('contacts.html'); });

  var C = {rn:'linear-gradient(135deg,#F5C543,#9B6BF0)', leaf:'linear-gradient(135deg,#1FB6D6,#1877F2)', dark:'linear-gradient(135deg,#3A1C5A,#7B2FF7)', land:'linear-gradient(135deg,#4FA8F5,#16A085)', gray:'#5B6470', blue:'linear-gradient(135deg,#4FA8F5,#1877F2)'};

  var friends = [
    {n:'account001', av:'200', c:C.dark},
    {n:'Ái Mỹ', av:'Á', c:C.land},
    {n:'Change name55', av:'C', c:C.leaf},
    {n:'rtetetet', av:'R', c:C.gray},
    {n:'Thuận Đỗ', av:'T', c:C.gray}
  ];
  var groups = [
    {n:'rtetetet, account001, Chang...', av:'RN', c:C.rn, sub:'85 thành viên'},
    {n:'[2.HOÀNG TÚ]', av:'HT', c:C.land, sub:'12 thành viên'}
  ];
  var recv = [
    {n:'rtetetet', av:'R', c:C.rn, sub:'Muốn kết bạn với bạn'},
    {n:'Change name55', av:'C', c:C.leaf, sub:'Muốn kết bạn với bạn'}
  ];
  var sent = [
    {n:'[2.HOÀNG TÚ]', av:'HT', c:C.land, sub:'Có thể kết bạn'},
    {n:'+84966613625', av:'+', c:C.blue, sub:'Có thể kết bạn'},
    {n:'+84912345678', av:'+', c:C.gray, sub:'Có thể kết bạn'}
  ];

  // Bạn bè theo bảng chữ cái
  function renderFriends(filter){
    var box=document.getElementById('friendList'); box.innerHTML='';
    var list = friends.filter(function(f){ return !filter || f.n.toLowerCase().indexOf(filter.toLowerCase())>-1; })
      .sort(function(a,b){ return a.n.localeCompare(b.n,'vi'); });
    var cur='';
    list.forEach(function(f){
      var L=f.n[0].toUpperCase();
      if(L!==cur){ cur=L; var g=document.createElement('div'); g.className='grp-label'; g.textContent=L; box.appendChild(g); }
      var el=document.createElement('div'); el.className='frow';
      el.innerHTML='<div class="av" style="background:'+f.c+'">'+f.av+'</div><div class="nm">'+f.n+'</div>'+
        '<div class="acts"><button title="Nhắn tin" onclick="event.stopPropagation();location.href=\'app.html\'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.5 8.5 0 01-12.4 7.5L3 21l2-5.6A8.5 8.5 0 1121 11.5z"/></svg></button>'+
        '<button title="Gọi thoại" onclick="event.stopPropagation();location.href=\'call.html?type=voice&name='+encodeURIComponent(f.n)+'\'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 4c.5 0 1 .3 1.2.8l1.2 2.8c.2.5.1 1-.3 1.4l-1.3 1.3c1 2 2.6 3.6 4.6 4.6l1.3-1.3c.4-.4.9-.5 1.4-.3l2.8 1.2c.5.2.8.7.8 1.2v2.8c0 .8-.7 1.5-1.5 1.4C9.6 19.6 4.4 14.4 4 6.5 3.9 5.7 4.6 5 5.4 5z"/></svg></button></div>';
      el.onclick=function(){ openFriendModal && openFriendModal({name:f.n, av:f.av, color:f.c}); };
      box.appendChild(el);
    });
    if(!list.length) box.innerHTML='<div class="empty">Không tìm thấy bạn bè</div>';
  }
  function filterFriends(v){ renderFriends(v); }

  function renderGroups(){
    var box=document.getElementById('groupList'); box.innerHTML='';
    groups.forEach(function(g){
      var el=document.createElement('div'); el.className='frow'; el.style.marginBottom='6px';
      el.innerHTML='<div class="av" style="background:'+g.c+'">'+g.av+'</div><div class="nm">'+g.n+'<div style="font-size:13px;color:var(--text-secondary)">'+g.sub+'</div></div>';
      el.onclick=function(){ location.href='app.html'; };
      box.appendChild(el);
    });
  }

  function reqCard(p, kind){
    var btns = kind==='recv'
      ? '<div class="btns"><button class="btn-reject" onclick="respond(this,\'Đã từ chối\')">Từ chối</button><button class="btn-accept" onclick="respond(this,\'Bạn bè\')">Chấp nhận</button></div>'
      : '<div class="btns"><button class="btn-revoke" onclick="respond(this,\'Đã thu hồi\')">Thu hồi</button></div>';
    return '<div class="req-card"><div class="top"><div class="av" style="background:'+p.c+'">'+p.av+'</div><div><div class="nm">'+p.n+'</div><div class="sub">'+p.sub+'</div></div></div>'+btns+'</div>';
  }
  function renderReq(){
    document.getElementById('reqRecv').innerHTML = recv.map(function(p){ return reqCard(p,'recv'); }).join('');
    document.getElementById('reqSent').innerHTML = sent.map(function(p){ return reqCard(p,'sent'); }).join('');
  }
  function reqTab(which, el){
    document.querySelectorAll('.req-tab').forEach(function(t){ t.classList.remove('active'); }); el.classList.add('active');
    document.getElementById('reqRecv').style.display = which==='recv' ? '' : 'none';
    document.getElementById('reqSent').style.display = which==='sent' ? '' : 'none';
  }
  function respond(btn, status){
    var card = btn.closest('.req-card');
    var s = document.createElement('div'); s.className='req-status'; s.textContent=status;
    card.querySelector('.btns').replaceWith(s);
  }

  var TITLES = {friends:'Danh sách bạn bè', groups:'Danh sách nhóm', requests:'Lời mời kết bạn'};
  function showView(id, el){
    document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.remove('active'); }); el.classList.add('active');
    document.querySelectorAll('.panel').forEach(function(p){ p.classList.toggle('active', p.id===id); });
    document.getElementById('viewTitle').textContent = TITLES[id];
  }

  renderFriends(''); renderGroups(); renderReq();
</script>
<script src="account-modal.js"></script>
<script src="desktop-modals.js"></script>
</body>
</html>
