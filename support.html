<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FBV.ONE — Hỗ trợ</title>
<link rel="stylesheet" href="assets/css/styles.css" />
<link rel="stylesheet" href="assets/css/doc-page.css" />
</head>
<body class="doc-body">
  <div class="doc-screen">

    <header class="doc-header">
      <button class="back" aria-label="Quay lại" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="ttl">Hỗ trợ</div>
    </header>

    <div class="sp-wrap">
      <div class="sp-intro">
        <h1>Chúng tôi có thể giúp gì cho bạn?</h1>
        <p>Gửi yêu cầu hỗ trợ, đội ngũ FBV.ONE sẽ phản hồi qua email trong vòng 24 giờ làm việc.</p>
      </div>

      <form class="sp-form" id="spForm" onsubmit="return submitSupport(event)">
        <label>Họ và tên <span>*</span>
          <input type="text" id="spName" required placeholder="Nhập họ và tên" />
        </label>
        <label>Email <span>*</span>
          <input type="email" id="spEmail" required placeholder="email@example.com" />
        </label>
        <label>Chủ đề
          <select id="spTopic">
            <option>Sự cố kỹ thuật</option>
            <option>Tài khoản &amp; đăng nhập</option>
            <option>Góp ý tính năng</option>
            <option>Báo cáo vi phạm</option>
            <option>Khác</option>
          </select>
        </label>
        <label>Nội dung <span>*</span>
          <textarea id="spMsg" required rows="6" placeholder="Mô tả chi tiết vấn đề bạn gặp phải..."></textarea>
        </label>
        <button type="submit" class="sp-submit">Gửi yêu cầu</button>
      </form>

      <div class="sp-alt">
        <div class="sp-alt-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
          <div><div class="l">Email hỗ trợ</div><a href="mailto:support@fbv.one">support@fbv.one</a></div>
        </div>
        <div class="sp-alt-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          <div><div class="l">Biểu mẫu Google</div><a href="https://docs.google.com/forms/d/e/1FAIpQLSdMIKa8N92x35uLSw8Z-p4zOnc3cxsNMXDfbeDAL7QRtUYFPg/viewform" target="_blank" rel="noopener">Mở biểu mẫu trong tab mới</a></div>
        </div>
      </div>
    </div>

  </div>

  <script src="assets/js/toast.js"></script>
  <script>
    function submitSupport(e){
      e.preventDefault();
      document.getElementById('spForm').reset();
      if(window.showToast) showToast('Đã gửi yêu cầu hỗ trợ. Cảm ơn bạn!');
      else alert('Đã gửi yêu cầu hỗ trợ. Cảm ơn bạn!');
      return false;
    }
  </script>
</body>
</html>
