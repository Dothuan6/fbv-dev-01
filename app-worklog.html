<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FBV.ONE — Nhật ký làm việc</title>
<link rel="stylesheet" href="assets/css/styles.css" />
<link rel="stylesheet" href="assets/css/app-worklog.css" />
</head>
<body>
  <div class="shell" id="shell">

    <!-- Rail -->
    <nav class="rail">
      <div class="me" title="Cá nhân" onclick="openAccountModal()">R</div>
      <div class="nav" title="Tin nhắn" onclick="location.href='app.html'"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h16v12H7l-3 3z"/></svg></div>
      <div class="nav" title="Danh bạ" onclick="location.href='app-contacts.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.5"/><path d="M2.5 20c0-3.6 2.9-5.5 6.5-5.5s6.5 1.9 6.5 5.5"/><path d="M16 5a3.5 3.5 0 010 6"/><path d="M18 14.5c2.6.4 4 2 4 5.5"/></svg></div>
      <div class="nav" title="Bản tin" onclick="location.href='app-feed.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9 15l1.5-4.5L15 9l-1.5 4.5z" fill="currentColor" stroke="none"/></svg></div>
      <div class="spacer"></div>
      <div class="nav" title="Cài đặt" onclick="openSettingsModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 13a7.9 7.9 0 000-2l2-1.5-2-3.4-2.3 1a8 8 0 00-1.7-1l-.3-2.6h-4l-.3 2.6a8 8 0 00-1.7 1l-2.3-1-2 3.4L4.6 11a7.9 7.9 0 000 2l-2 1.5 2 3.4 2.3-1a8 8 0 001.7 1l.3 2.6h4l.3-2.6a8 8 0 001.7-1l2.3 1 2-3.4z"/></svg></div>
    </nav>

    <!-- Chat nhật ký -->
    <section class="main-col">
      <header class="mc-header">
        <div class="av"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="13" y2="14"/></svg></div>
        <div class="who"><div class="nm">Nhật ký làm việc</div><div class="st">Lưu và đồng bộ dữ liệu giữa các thiết bị</div></div>
        <div class="acts">
          <svg onclick="openSearch()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
          <svg class="toggle active" id="infoToggle" onclick="toggleInfo()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="15" y1="4" x2="15" y2="20"/></svg>
        </div>
      </header>
      <header class="sbar">
        <div class="f"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg><input id="sInput" placeholder="Tìm trong nhật ký" oninput="doSearch()"></div>
        <span class="cnt" id="sCnt"></span>
        <button class="x" onclick="closeSearch()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
      </header>

      <div class="mc-body" id="body">
        <div class="media-msg">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1c-1 .1-2.1.6-2.8 1.4-.6.7-1.1 1.7-.9 2.7 1 .1 2.1-.5 2.8-1.2.6-.7 1.1-1.7.9-2.9zM20.5 17.2c-.5 1.2-.8 1.8-1.5 2.9-1 1.5-2.4 3.5-4.1 3.5-1.5 0-1.9-1-4-1-2 0-2.5 1-4 1-1.7 0-3-1.8-4-3.3C-.1 16.8-.4 11.8 1.3 9.2c1-1.6 2.7-2.6 4.3-2.6 1.6 0 2.6 1 3.9 1 1.3 0 2-1 3.9-1 1.4 0 2.9.8 3.9 2.1-3.4 1.9-2.9 6.8.9 8.5z"/></svg>
          <span class="t">11:32</span>
        </div>
        <div class="msg"><span class="mt">hi</span><span class="t">11:52</span></div>
        <div class="msg"><span class="mt">Tôi yêu Việt Nam</span><span class="t">11:53</span></div>
      </div>

      <div class="composer">
        <input id="mInput" placeholder="Nhật ký..." />
        <svg class="c-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.5l-8.5 8.5a5 5 0 01-7-7l8.5-8.5a3.5 3.5 0 015 5l-8.5 8.5a2 2 0 01-3-3l8-8"/></svg>
        <svg class="c-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="2"/><path d="M5 19l5-5 3 3 3-3 3 3"/></svg>
        <span class="send" onclick="send()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 20l18-8L3 4l3 8-3 8z"/></svg></span>
      </div>
    </section>

    <!-- Panel Phương tiện -->
    <aside class="info-col show" id="infoCol">
      <div class="ic-head">Nhật ký làm việc</div>
      <div class="ic-desc">Lưu trữ và truy cập nhanh những nội dung quan trọng của bạn.</div>
      <div class="ic-sec">
        <div class="store">Dung lượng lưu trữ — 426 MB / 500 MB<div class="bar"><span></span></div></div>
      </div>
      <div class="ic-sec"><h4>Ảnh/Video</h4>
        <div class="ic-media">
          <div class="m"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1c-1 .1-2.1.6-2.8 1.4-.6.7-1.1 1.7-.9 2.7 1 .1 2.1-.5 2.8-1.2.6-.7 1.1-1.7.9-2.9zM20.5 17.2c-.5 1.2-.8 1.8-1.5 2.9-1 1.5-2.4 3.5-4.1 3.5-1.5 0-1.9-1-4-1-2 0-2.5 1-4 1-1.7 0-3-1.8-4-3.3C-.1 16.8-.4 11.8 1.3 9.2c1-1.6 2.7-2.6 4.3-2.6 1.6 0 2.6 1 3.9 1 1.3 0 2-1 3.9-1 1.4 0 2.9.8 3.9 2.1-3.4 1.9-2.9 6.8.9 8.5z"/></svg></div>
          <div class="m" style="background:#1f2630"></div>
          <div class="m" style="background:linear-gradient(135deg,#8bd17c,#4a8f3c)"></div>
        </div>
      </div>
      <div class="ic-sec"><h4>File</h4><div style="color:var(--text-secondary);font-size:14px">Chưa có File được chia sẻ</div></div>
    </aside>

  </div>

<script src="assets/js/app-worklog.js"></script>
<script src="assets/js/account-modal.js"></script>
<script src="assets/js/toast.js"></script>
<script src="assets/js/desktop-modals-v2.js"></script>
</body>
</html>
