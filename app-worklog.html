<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FBV.ONE — Nhật ký làm việc</title>
<link rel="stylesheet" href="styles.css" />
<style>
  html,body{height:100%}
  .shell{display:flex;height:100vh;overflow:hidden;background:var(--bg-base)}

  .rail{width:64px;flex:none;background:linear-gradient(180deg,#1565E0,#0A66FF);display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 0;color:#fff}
  .rail .me{width:44px;height:44px;border-radius:50%;background:#5B6470;margin-bottom:12px;display:flex;align-items:center;justify-content:center;font-weight:600;cursor:pointer}
  .rail .nav{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.85)}
  .rail .nav:hover{background:rgba(255,255,255,.14)}
  .rail .nav.active{background:rgba(255,255,255,.22);color:#fff}
  .rail .nav svg{width:26px;height:26px}
  .rail .spacer{flex:1}

  .main-col{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg-chat)}
  .mc-header{display:flex;align-items:center;gap:12px;padding:10px 18px;background:#fff;border-bottom:1px solid var(--border)}
  .mc-header .av{width:44px;height:44px;border-radius:50%;flex:none;background:linear-gradient(135deg,#1FB6D6,#1877F2);display:flex;align-items:center;justify-content:center;color:#fff}
  .mc-header .av svg{width:24px;height:24px}
  .mc-header .who{flex:1;min-width:0}
  .mc-header .nm{font-size:17px;font-weight:700}
  .mc-header .st{font-size:13px;color:var(--text-secondary)}
  .mc-header .acts{display:flex;gap:16px;color:var(--text-primary)}
  .mc-header .acts svg{width:22px;height:22px;cursor:pointer}
  .mc-header .acts .toggle.active{color:var(--primary)}
  /* search bar */
  .sbar{display:none;align-items:center;gap:12px;padding:10px 18px;background:#fff;border-bottom:1px solid var(--border)}
  .searching .sbar{display:flex} .searching .mc-header{display:none}
  .sbar .f{flex:1;display:flex;align-items:center;gap:8px;background:var(--surface-field);border-radius:10px;padding:9px 12px}
  .sbar .f svg{width:18px;height:18px;color:var(--text-secondary)} .sbar .f input{flex:1;border:none;outline:none;background:transparent;font-size:15px}
  .sbar .x{background:none;border:none;cursor:pointer;color:var(--text-secondary)} .sbar .x svg{width:22px;height:22px}
  .sbar .cnt{font-size:14px;color:var(--text-secondary)}

  .mc-body{flex:1;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:10px}
  .mc-body > :first-child{margin-top:auto}
  .day{align-self:center;background:rgba(0,0,0,.06);color:var(--text-secondary);font-size:13px;padding:3px 12px;border-radius:12px;margin:6px 0}
  .msg{align-self:flex-end;background:#DBEBFF;border:1px solid #CFE3FB;border-radius:14px;padding:9px 13px;font-size:15px;max-width:60%}
  .msg .t{display:block;font-size:11px;color:var(--text-secondary);margin-top:4px}
  .media-msg{align-self:flex-end;width:220px;aspect-ratio:1/1;border-radius:16px;background:#9aa3ad;display:flex;align-items:center;justify-content:center;position:relative}
  .media-msg svg{width:46%;height:46%;color:#fff}
  .media-msg .t{position:absolute;right:8px;bottom:8px;background:rgba(0,0,0,.5);color:#fff;font-size:12px;padding:2px 7px;border-radius:10px}
  mark{background:#FFE14D;border-radius:2px}

  .composer{background:#fff;border-top:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:12px 18px}
  .composer input{flex:1;border:none;outline:none;font-size:15px;background:transparent}
  .composer .c-icon{width:24px;height:24px;color:var(--text-secondary);cursor:pointer}
  .composer .send{color:var(--primary);cursor:pointer}
  .composer .send svg{width:24px;height:24px}

  .info-col{width:340px;flex:none;border-left:1px solid var(--border);background:#fff;overflow-y:auto;display:none}
  .info-col.show{display:block}
  .ic-head{text-align:center;font-size:17px;font-weight:700;padding:16px;border-bottom:1px solid var(--border)}
  .ic-sec{padding:16px;border-top:8px solid var(--bg-subtle)}
  .ic-sec:first-of-type{border-top:none}
  .ic-sec h4{font-size:15px;font-weight:700;margin-bottom:12px}
  .ic-desc{text-align:center;padding:18px 16px;color:var(--text-secondary);font-size:14px}
  .ic-media{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .ic-media .m{aspect-ratio:1/1;border-radius:8px;background:#c9d3de;display:flex;align-items:center;justify-content:center;color:#fff}
  .ic-media .m svg{width:40%;height:40%}
  .store{font-size:14px;color:var(--text-secondary)}
  .store .bar{height:8px;border-radius:4px;background:var(--surface-field);margin:8px 0;overflow:hidden}
  .store .bar span{display:block;height:100%;width:85%;background:linear-gradient(90deg,#F5A623,#16A085,#E5484D)}

  @media (max-width:1023px){ .shell{display:none} }
</style>
</head>
<body>
  <div class="shell" id="shell">

    <!-- Rail -->
    <nav class="rail">
      <div class="me" title="Cá nhân" onclick="openAccountModal()">R</div>
      <div class="nav" title="Tin nhắn" onclick="location.href='app.html'"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h16v12H7l-3 3z"/></svg></div>
      <div class="nav" title="Danh bạ" onclick="location.href='app-contacts.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.5"/><path d="M2.5 20c0-3.6 2.9-5.5 6.5-5.5s6.5 1.9 6.5 5.5"/><path d="M16 5a3.5 3.5 0 010 6"/><path d="M18 14.5c2.6.4 4 2 4 5.5"/></svg></div>
      <div class="nav" title="Bản tin" onclick="location.href='app-feed.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9 15l1.5-4.5L15 9l-1.5 4.5z" fill="currentColor" stroke="none"/></svg></div>
      <div class="spacer"></div>
      <div class="nav" title="Cài đặt" onclick="openSettingsModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 13a7.9 7.9 0 000-2l2-1.5-2-3.4-2.3 1a8 8 0 00-1.7-1l-.3-2.6h-4l-.3 2.6a8 8 0 00-1.7 1l-2.3-1-2 3.4L4.6 11a7.9 7.9 0 000 2l-2 1.5 2 3.4 2.3-1a8 8 0 001.7 1l.3 2.6h4l.3-2.6a8 8 0 001.7-1l2.3 1 2-3.4z"/></svg></div>
    </nav>

    <!-- Chat nhật ký -->
    <section class="main-col">
      <header class="mc-header">
        <div class="av"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="13" y2="14"/></svg></div>
        <div class="who"><div class="nm">Nhật ký làm việc</div><div class="st">Lưu và đồng bộ dữ liệu giữa các thiết bị</div></div>
        <div class="acts">
          <svg onclick="openSearch()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
          <svg class="toggle active" id="infoToggle" onclick="toggleInfo()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="15" y1="4" x2="15" y2="20"/></svg>
        </div>
      </header>
      <header class="sbar">
        <div class="f"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg><input id="sInput" placeholder="Tìm trong nhật ký" oninput="doSearch()"></div>
        <span class="cnt" id="sCnt"></span>
        <button class="x" onclick="closeSearch()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
      </header>

      <div class="mc-body" id="body">
        <div class="media-msg">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1c-1 .1-2.1.6-2.8 1.4-.6.7-1.1 1.7-.9 2.7 1 .1 2.1-.5 2.8-1.2.6-.7 1.1-1.7.9-2.9zM20.5 17.2c-.5 1.2-.8 1.8-1.5 2.9-1 1.5-2.4 3.5-4.1 3.5-1.5 0-1.9-1-4-1-2 0-2.5 1-4 1-1.7 0-3-1.8-4-3.3C-.1 16.8-.4 11.8 1.3 9.2c1-1.6 2.7-2.6 4.3-2.6 1.6 0 2.6 1 3.9 1 1.3 0 2-1 3.9-1 1.4 0 2.9.8 3.9 2.1-3.4 1.9-2.9 6.8.9 8.5z"/></svg>
          <span class="t">11:32</span>
        </div>
        <div class="msg"><span class="mt">hi</span><span class="t">11:52</span></div>
        <div class="msg"><span class="mt">Tôi yêu Việt Nam</span><span class="t">11:53</span></div>
      </div>

      <div class="composer">
        <input id="mInput" placeholder="Nhật ký..." />
        <svg class="c-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.5l-8.5 8.5a5 5 0 01-7-7l8.5-8.5a3.5 3.5 0 015 5l-8.5 8.5a2 2 0 01-3-3l8-8"/></svg>
        <svg class="c-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="2"/><path d="M5 19l5-5 3 3 3-3 3 3"/></svg>
        <span class="send" onclick="send()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 20l18-8L3 4l3 8-3 8z"/></svg></span>
      </div>
    </section>

    <!-- Panel Phương tiện -->
    <aside class="info-col show" id="infoCol">
      <div class="ic-head">Nhật ký làm việc</div>
      <div class="ic-desc">Lưu trữ và truy cập nhanh những nội dung quan trọng của bạn.</div>
      <div class="ic-sec">
        <div class="store">Dung lượng lưu trữ — 426 MB / 500 MB<div class="bar"><span></span></div></div>
      </div>
      <div class="ic-sec"><h4>Ảnh/Video</h4>
        <div class="ic-media">
          <div class="m"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1c-1 .1-2.1.6-2.8 1.4-.6.7-1.1 1.7-.9 2.7 1 .1 2.1-.5 2.8-1.2.6-.7 1.1-1.7.9-2.9zM20.5 17.2c-.5 1.2-.8 1.8-1.5 2.9-1 1.5-2.4 3.5-4.1 3.5-1.5 0-1.9-1-4-1-2 0-2.5 1-4 1-1.7 0-3-1.8-4-3.3C-.1 16.8-.4 11.8 1.3 9.2c1-1.6 2.7-2.6 4.3-2.6 1.6 0 2.6 1 3.9 1 1.3 0 2-1 3.9-1 1.4 0 2.9.8 3.9 2.1-3.4 1.9-2.9 6.8.9 8.5z"/></svg></div>
          <div class="m" style="background:#1f2630"></div>
          <div class="m" style="background:linear-gradient(135deg,#8bd17c,#4a8f3c)"></div>
        </div>
      </div>
      <div class="ic-sec"><h4>File</h4><div style="color:var(--text-secondary);font-size:14px">Chưa có File được chia sẻ</div></div>
    </aside>

  </div>

<script>
  if(window.innerWidth < 1024) location.replace('worklog.html');
  window.addEventListener('resize', function(){ if(window.innerWidth < 1024) location.replace('worklog.html'); });

  var body=document.getElementById('body'), mInput=document.getElementById('mInput'), shell=document.getElementById('shell');
  function esc(s){ return s.replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function nowHH(){ var t=new Date(); return String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0'); }

  mInput.addEventListener('keydown', function(e){ if(e.key==='Enter') send(); });
  function send(){
    if(!mInput.value.trim()) return;
    var d=document.createElement('div'); d.className='msg';
    d.innerHTML='<span class="mt">'+esc(mInput.value.trim())+'</span><span class="t">'+nowHH()+'</span>';
    body.appendChild(d); body.scrollTop=body.scrollHeight; mInput.value='';
  }

  function toggleInfo(){ document.getElementById('infoCol').classList.toggle('show'); document.getElementById('infoToggle').classList.toggle('active'); }

  function openSearch(){ shell.classList.add('searching'); document.getElementById('sInput').focus(); }
  function closeSearch(){ shell.classList.remove('searching'); document.getElementById('sInput').value=''; document.getElementById('sCnt').textContent=''; clearHL(); }
  function clearHL(){ document.querySelectorAll('#body .mt').forEach(function(el){ if(el.dataset.raw!=null) el.textContent=el.dataset.raw; }); }
  function escRe(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
  function doSearch(){
    var term=document.getElementById('sInput').value.trim(), n=0;
    document.querySelectorAll('#body .mt').forEach(function(el){
      var raw=el.dataset.raw!=null?el.dataset.raw:el.textContent; el.dataset.raw=raw;
      if(term){ var re=new RegExp('('+escRe(term)+')','gi'), m=raw.match(re); if(m){ el.innerHTML=raw.replace(re,'<mark>$1</mark>'); n+=m.length; } else el.textContent=raw; }
      else el.textContent=raw;
    });
    document.getElementById('sCnt').textContent = term ? (n+' kết quả') : '';
  }
</script>
<script src="account-modal.js"></script>
<script src="desktop-modals.js"></script>
</body>
</html>
