<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FBV.ONE — Thiết lập mật khẩu</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-body">

  <!-- Brand panel (desktop) -->
  <section class="brand-panel">
    <div class="logo-mark"><div class="core"><span></span></div></div>
    <div class="wordmark">FBV.ONE</div>
    <p class="tagline">Tạo tài khoản để bắt đầu nhắn tin, gọi thoại và video an toàn.</p>
  </section>

  <!-- Form panel -->
  <section class="form-panel">
    <div class="card">
      <button class="back-btn" aria-label="Quay lại" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1C1C1E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <h1 class="title">Thiết lập mật khẩu đăng nhập</h1>

      <form onsubmit="return false">
        <div class="input-group" style="margin-bottom:8px">
          <div class="pw-wrap">
            <input class="field" type="password" id="pw1" placeholder="Nhập mật khẩu" />
            <button type="button" class="pw-toggle" aria-label="Hiện/ẩn mật khẩu" onclick="togglePw('pw1','eye1')">
              <svg id="eye1" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/><line x1="3" y1="3" x2="21" y2="21"/>
              </svg>
            </button>
          </div>
          <p class="field-hint">Mật khẩu phải lớn hơn 8 ký tự và nhỏ hơn 30 ký tự</p>
        </div>

        <div class="input-group">
          <div class="pw-wrap">
            <input class="field" type="password" id="pw2" placeholder="Nhập lại mật khẩu" />
            <button type="button" class="pw-toggle" aria-label="Hiện/ẩn mật khẩu" onclick="togglePw('pw2','eye2')">
              <svg id="eye2" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/><line x1="3" y1="3" x2="21" y2="21"/>
              </svg>
            </button>
          </div>
        </div>

        <button class="btn btn-primary" onclick="window.location.href='messages.html'">Tiếp theo</button>
      </form>
    </div>
  </section>

<script>
  function togglePw(inpId, eyeId){
    var inp = document.getElementById(inpId);
    var line = document.querySelector('#' + eyeId + ' line');
    var show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    line.style.display = show ? 'none' : '';
  }
</script>
</body>
</html>
