<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FBV.ONE — Chủ đề</title>
<link rel="stylesheet" href="assets/css/styles.css" />
<link rel="stylesheet" href="assets/css/thread.css" />
</head>
<body class="app-body">
  <div class="chat-screen">

    <!-- Header -->
    <header class="chat-header">
      <button class="back" aria-label="Quay lại" onclick="window.location.href='chat.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="who">
        <div class="nm">Chủ đề</div>
        <div class="st">Từ: Thuận Đỗ</div>
      </div>
    </header>

    <!-- Body -->
    <div class="chat-body" id="chatBody">

      <!-- Tin gốc -->
      <div class="root-msg">
        <div class="avatar">R</div>
        <div class="root-card">
          <div class="sender">rtetetet</div>
          <div class="text">Hi</div>
          <span class="time">16:38</span>
        </div>
      </div>

      <div class="thread-divider" id="replyCount">2 phản hồi trong chủ đề</div>

      <div class="day-label">Hôm nay</div>

      <!-- Phản hồi trong chuỗi -->
      <div class="bubble sent"><span class="msg-text">hi</span><span class="time">21:43</span></div>
      <div class="bubble sent"><span class="msg-text">Trả lời trong chuỗi</span><span class="time">21:43</span></div>

    </div>

    <!-- Thanh trả lời -->
    <div class="reply-bar">
      <div class="rb-content">
        <div class="rb-name" id="rbName">Trả lời:</div>
        <div class="rb-text" id="rbText"></div>
      </div>
      <button class="rb-close" onclick="cancelReply()" aria-label="Hủy trả lời">&times;</button>
    </div>

    <!-- Composer -->
    <div class="composer">
      <input type="text" id="msgInput" placeholder="Tin nhắn" />
      <svg class="c-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.5l-8.5 8.5a5 5 0 01-7-7l8.5-8.5a3.5 3.5 0 015 5l-8.5 8.5a2 2 0 01-3-3l8-8"/></svg>
      <svg class="c-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="2"/><path d="M5 19l5-5 3 3 3-3 3 3"/></svg>
    </div>

  </div>

  <!-- Overlay + menu group -->
  <div class="ctx-overlay" id="ctxOverlay" onclick="closeCtx()"></div>
  <div class="ctx-group" id="ctxGroup">
    <div class="ctx-reactions">
      <span onclick="react('👍')">👍</span>
      <span onclick="react('❤️')">❤️</span>
      <span onclick="react('😂')">😂</span>
      <span onclick="react('😮')">😮</span>
      <span onclick="react('😢')">😢</span>
      <span onclick="react('😡')">😡</span>
    </div>
    <div class="ctx-menu">
      <div class="ctx-item" onclick="ctxAction('reply')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 17l-5-5 5-5"/><path d="M4 12h11a5 5 0 015 5v1"/></svg>
        Trả lời
      </div>
      <div class="ctx-item" onclick="ctxAction('copy')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 012-2h10"/></svg>
        Sao chép
      </div>
      <div class="ctx-item" onclick="ctxAction('forward')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 17l5-5-5-5"/><path d="M20 12H9a5 5 0 00-5 5v1"/></svg>
        Chuyển tiếp
      </div>
      <div class="ctx-item danger" onclick="ctxAction('deleteAll')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.5 8.5 0 01-12.4 7.5L3 21l2-5.6A8.5 8.5 0 1121 11.5z"/><line x1="9.5" y1="9" x2="14.5" y2="14"/><line x1="14.5" y1="9" x2="9.5" y2="14"/></svg>
        Xóa với mọi người
      </div>
      <div class="ctx-item danger" onclick="ctxAction('deleteMe')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M9 7V4h6v3"/><path d="M6 7l1 13h10l1-13"/></svg>
        Xoá chỉ bên tôi
      </div>
    </div>
  </div>

  <!-- Bottom sheet: danh sách cảm xúc -->
  <div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>
  <div class="sheet" id="reactSheet">
    <h3>Cảm xúc</h3>
    <div class="summary"><span class="reaction" id="sheetSummary"></span></div>
    <div class="reactor" onclick="removeReaction()">
      <div class="avatar">B</div>
      <div class="info"><div class="nm">Bạn</div><div class="sub">Nhấn để gỡ</div></div>
      <div class="emo" id="reactorEmo"></div>
    </div>
  </div>

<script src="assets/js/thread.js"></script>
</body>
</html>
