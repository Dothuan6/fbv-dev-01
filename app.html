<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FBV.ONE</title>
<link rel="stylesheet" href="assets/css/styles.css" />
<link rel="stylesheet" href="assets/css/app.css" />
</head>
<body>

  <div class="shell">

    <!-- Rail -->
    <nav class="rail">
      <div class="me" title="Cá nhân" onclick="openAccountModal()">R</div>
      <div class="nav active" title="Tin nhắn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h16v12H7l-3 3z"/></svg></div>
      <div class="nav" title="Danh bạ" onclick="location.href='app-contacts.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.5"/><path d="M2.5 20c0-3.6 2.9-5.5 6.5-5.5s6.5 1.9 6.5 5.5"/><path d="M16 5a3.5 3.5 0 010 6"/><path d="M18 14.5c2.6.4 4 2 4 5.5"/></svg></div>
      <div class="nav" title="Bản tin" onclick="location.href='app-feed.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9 15l1.5-4.5L15 9l-1.5 4.5z" fill="currentColor" stroke="none"/></svg></div>
      <div class="spacer"></div>
      <div class="nav" title="Cài đặt" onclick="openSettingsModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 13a7.9 7.9 0 000-2l2-1.5-2-3.4-2.3 1a8 8 0 00-1.7-1l-.3-2.6h-4l-.3 2.6a8 8 0 00-1.7 1l-2.3-1-2 3.4L4.6 11a7.9 7.9 0 000 2l-2 1.5 2 3.4 2.3-1a8 8 0 001.7 1l.3 2.6h4l.3-2.6a8 8 0 001.7-1l2.3 1 2-3.4z"/></svg></div>
    </nav>

    <!-- Danh sách -->
    <aside class="list-col">
      <div class="lc-top">
        <div class="lc-search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg><input placeholder="Tìm kiếm" /></div>
        <svg class="ic" onclick="openAddFriendModal()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.5"/><path d="M2.5 20c0-3.6 2.9-5.5 6.5-5.5 1.2 0 2.3.2 3.2.6"/><path d="M19 8v6M16 11h6"/></svg>
        <svg class="ic" onclick="openCreateGroupModal()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="9" r="3"/><circle cx="16" cy="9" r="3"/><path d="M2 20c0-3.3 2.7-5 6-5"/><path d="M14 15.2c2.6.4 4.5 2 4.5 4.8"/></svg>
      </div>
      <div class="lc-tabs">
        <span class="lc-tab active">Ưu tiên</span>
        <span class="lc-tab" onclick="location.href='app-worklog.html'">Khác</span>
      </div>
      <div class="conv-list" id="convList"></div>
    </aside>

    <!-- Khung chat -->
    <section class="main-col">
      <header class="mc-header">
        <div class="av" id="hAv"></div>
        <div class="who"><div class="nm" id="hNm"></div><div class="st" id="hSt"></div></div>
        <div class="acts">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 4c.5 0 1 .3 1.2.8l1.2 2.8c.2.5.1 1-.3 1.4l-1.3 1.3c1 2 2.6 3.6 4.6 4.6l1.3-1.3c.4-.4.9-.5 1.4-.3l2.8 1.2c.5.2.8.7.8 1.2v2.8c0 .8-.7 1.5-1.5 1.4C9.6 19.6 4.4 14.4 4 6.5 3.9 5.7 4.6 5 5.4 5z"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="13" height="12" rx="2"/><path d="M16 10l5-3v10l-5-3z"/></svg>
          <svg onclick="openConvSearch()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
          <svg class="toggle active" id="infoToggle" onclick="toggleInfo()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="15" y1="4" x2="15" y2="20"/></svg>
        </div>
      </header>

      <div class="mc-body" id="mcBody"></div>

      <div class="mc-composer">
        <div class="mc-tools">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="9" cy="10" r="1"/><circle cx="15" cy="10" r="1"/><path d="M8.5 14.5a4 4 0 007 0" stroke-linecap="round"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="2"/><path d="M5 19l5-5 3 3 3-3 3 3"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.5l-8.5 8.5a5 5 0 01-7-7l8.5-8.5a3.5 3.5 0 015 5l-8.5 8.5a2 2 0 01-3-3l8-8"/></svg>
        </div>
        <div class="mc-reply" id="mcReply">
          <div class="rb-body">
            <div class="rb-title"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 17l-5-5 5-5"/><path d="M4 12h11a5 5 0 015 5v1"/></svg> Trả lời <span id="rbName"></span></div>
            <div class="rb-text" id="rbText"></div>
          </div>
          <button class="rb-x" onclick="cancelReply()">&times;</button>
        </div>
        <div class="mc-input">
          <input id="mcInput" placeholder="Nhập tin nhắn..." />
          <span class="send" onclick="sendMsg()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 20l18-8L3 4l3 8-3 8z"/></svg></span>
        </div>
      </div>
    </section>

    <!-- Panel phải: thông tin / tìm kiếm -->
    <aside class="info-col show" id="infoCol">

      <!-- View: Thông tin -->
      <div class="info-view" id="infoView">
        <div class="ic-head" id="icHead">Thông tin hội thoại</div>
        <div class="ic-profile">
          <div class="av" id="iAv"></div>
          <div class="nm" id="iNm"></div>
        </div>
        <div class="ic-quick">
          <div class="q"><span class="cir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 00-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg></span>Tắt thông báo</div>
          <div class="q"><span class="cir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4v6l-2 5h10l-2-5V4"/><line x1="12" y1="15" x2="12" y2="21"/></svg></span>Ghim hội thoại</div>
          <div class="q" id="qGroup"><span class="cir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><circle cx="16" cy="8" r="3"/><path d="M2 19c0-3 2.5-4.5 5.5-4.5"/><path d="M14 15c3 0 5.5 1.5 5.5 4.5"/></svg></span><span id="qGroupLabel">Tạo nhóm</span></div>
        </div>
        <!-- Thành viên nhóm (chỉ nhóm) -->
        <div class="ic-sec ic-members" id="membersSec" style="display:none">
          <h4 id="membersTitle">Thành viên nhóm</h4>
          <div id="memberList"></div>
        </div>
        <div class="ic-sec">
          <h4>Ảnh/Video</h4>
          <div class="ic-media"><div class="m"></div><div class="m"></div><div class="m"></div><div class="m"></div></div>
        </div>
        <div class="ic-sec"><h4>File</h4><div style="color:var(--text-secondary);font-size:14px">Chưa có File được chia sẻ</div></div>
      </div>

      <!-- View: Tìm kiếm trong trò chuyện -->
      <div class="search-view" id="searchView">
        <div class="sv-head"><h4>Tìm kiếm trong trò chuyện</h4><button class="x" onclick="closeConvSearch()">&times;</button></div>
        <div class="sv-field">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
          <input id="convSearch" placeholder="Nhập từ khóa để tìm kiếm" oninput="doConvSearch()" />
        </div>
        <div class="sv-count" id="svCount"></div>
      </div>

    </aside>

  </div>

  <!-- Modal Chia sẻ (chuyển tiếp) -->
  <div class="modal-overlay" id="fwOverlay">
    <div class="modal">
      <div class="mh"><h3>Chia sẻ</h3><button class="x" onclick="closeForward()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button></div>
      <div class="mbody">
        <div class="fw-search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg><input placeholder="Tìm kiếm..." oninput="fwFilter(this.value)" /></div>
        <div class="fw-tabs"><span class="fw-tab active">Gần đây</span><span class="fw-tab">Nhóm trò chuyện</span><span class="fw-tab">Bạn bè</span></div>
        <div id="fwList"></div>
        <div class="fw-link"><div class="l">Chia sẻ nội dung</div><div class="u" id="fwPreview"></div></div>
      </div>
      <div class="mf"><button class="cancel" onclick="closeForward()">Hủy</button><button class="ok" id="fwOk" onclick="doForward()" disabled>Chia sẻ</button></div>
    </div>
  </div>

  <!-- Modal Biểu cảm (ai đã thả cảm xúc) -->
  <div class="modal-overlay" id="rxOverlay">
    <div class="modal rx-modal">
      <div class="mh"><h3>Biểu cảm</h3><button class="x" onclick="closeReactions()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button></div>
      <div class="rx-body">
        <div class="rx-tabs" id="rxTabs"></div>
        <div class="rx-people" id="rxPeople"></div>
      </div>
    </div>
  </div>

  <!-- Panel Chủ đề (trả lời trong chuỗi) -->
  <aside class="thread-panel" id="threadPanel">
    <div class="tp-head">
      <div class="who"><div class="nm">Chủ đề</div><div class="sub" id="tpFrom"></div></div>
      <button class="x" onclick="closeThread()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
    </div>
    <div class="tp-body" id="tpBody"></div>
    <div class="tp-composer">
      <input id="tpInput" placeholder="Nhập tin nhắn..." />
      <span class="send" onclick="sendThread()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 20l18-8L3 4l3 8-3 8z"/></svg></span>
    </div>
  </aside>

  <!-- Reaction picker -->
  <div class="pop picker" id="picker">
    <span onclick="react('👍')">👍</span><span onclick="react('❤️')">❤️</span><span onclick="react('😂')">😂</span><span onclick="react('😮')">😮</span><span onclick="react('😢')">😢</span><span onclick="react('😡')">😡</span>
  </div>
  <!-- Menu ... -->
  <div class="pop menu" id="msgMenu">
    <div class="it" onclick="msgAct('thread')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.5 8.5 0 01-12.4 7.5L3 21l2-5.6A8.5 8.5 0 1121 11.5z"/></svg>Trả lời trong chuỗi</div>
    <div class="it" onclick="msgAct('copy')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 012-2h10"/></svg>Sao chép</div>
    <div class="it danger" onclick="msgAct('recall')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 109-9"/><path d="M3 4v4h4"/></svg>Thu hồi</div>
    <div class="it danger" onclick="msgAct('delete')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M9 7V4h6v3"/><path d="M6 7l1 13h10l1-13"/></svg>Xóa</div>
  </div>

<script src="assets/js/app.js"></script>
<script src="assets/js/account-modal.js"></script>
<script src="assets/js/desktop-modals.js"></script>
</body>
</html>
