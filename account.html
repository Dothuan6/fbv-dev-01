<!DOCTYPE html>
<html lang="vi">
<head>

<link rel="stylesheet" href="assets/css/styles.css" />

<body class="app-body">
  <div class="app-screen">

    <!-- Header -->
    <header class="ac-header">
      <div class="ac-avatar">R</div>
      <div class="ac-name">rtetetet</div>
      <div class="ac-handle">@yase0</div>
    </header>

    <!-- Menu -->
    <div class="ac-list">
      <div class="ac-item" onclick="location.href='my-profile.html'">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg>
        <span class="t">Trang cá nhân</span>
        <span class="chev">›</span>
      </div>
      <div class="ac-item" onclick="location.href='worklog.html'">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="13" y2="14"/></svg>
        <span class="t">Nhật ký làm việc</span>
        <span class="chev">›</span>
      </div>
      <div class="ac-item" onclick="location.href='settings.html'">

        <span class="t">Cài đặt</span>
        <span class="chev">›</span>
      </div>
    </div>

    <!-- Bottom tab -->
    <nav class="bottom-tab">
      <div class="tab-item" onclick="location.href='messages.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M4 4h16v12H7l-3 3z"/></svg>
        Tin nhắn
      </div>
      <div class="tab-item" onclick="location.href='contacts.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.5"/><path d="M2.5 20c0-3.6 2.9-5.5 6.5-5.5s6.5 1.9 6.5 5.5"/><path d="M16 5a3.5 3.5 0 010 6"/><path d="M18 14.5c2.6.4 4 2 4 5.5"/></svg>
        Danh bạ
      </div>
      <div class="tab-item" onclick="location.href='feed.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9 15l1.5-4.5L15 9l-1.5 4.5z" fill="currentColor" stroke="none"/></svg>
        Bản tin
      </div>
      <div class="tab-item active">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7z"/></svg>
        Cá nhân
