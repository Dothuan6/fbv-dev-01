<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FBV.ONE — Thêm bạn</title>
<link rel="stylesheet" href="assets/css/styles.css" />
<link rel="stylesheet" href="assets/css/add-friend.css" />
</head>
<body class="af-body">
  <div class="af-screen">

    <!-- Header -->
    <header class="af-header">
      <button class="back" aria-label="Quay lại" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="ttl">Thêm bạn</div>
    </header>

    <div class="af-content">

      <!-- Thẻ QR -->
      <div class="qr-card">
        <div class="uname">@yase0</div>
        <div class="qr-box">
          <canvas id="qr" width="240" height="240"></canvas>
          <div class="qr-logo">CTT</div>
        </div>
        <div class="cap">Quét mã để thêm bạn với tôi</div>
      </div>

      <!-- Ô nhập -->
      <div class="af-input-row">
        <input type="text" placeholder="Nhập @username, email ..." />
        <button class="af-send" aria-label="Tìm">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="19" y2="12"/><path d="M13 6l6 6-6 6"/></svg>
        </button>
      </div>

      <!-- Quét QR -->
      <div class="af-scan" onclick="location.href='scan-qr.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><line x1="14" y1="14" x2="14" y2="21"/><line x1="18" y1="14" x2="18" y2="18"/><line x1="21" y1="17" x2="21" y2="21"/></svg>
        <span>Quét mã QR</span>
      </div>

      <!-- Hint -->
      <div class="af-hint" onclick="location.href='friend-requests.html'">Xem lời mời kết bạn đã gửi tại danh bạ</div>

    </div>
  </div>

<script src="assets/js/add-friend.js"></script>
</body>
</html>
