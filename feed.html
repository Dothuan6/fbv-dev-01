<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FBV.ONE — Bản tin</title>
<link rel="stylesheet" href="assets/css/styles.css" />
<link rel="stylesheet" href="assets/css/feed.css" />
</head>
<body class="app-body">
  <div class="app-screen">

    <!-- Header -->
    <header class="fd-header">
      <div class="search" onclick="location.href='search.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
        <span>Tìm kiếm</span>
      </div>
      <svg class="h-icon" onclick="location.href='create-post.html'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </header>

    <div class="fd-scroll">

      <!-- Soạn nhanh -->
      <div class="composer-card">
        <div class="cp-row">
          <div class="avatar">R</div>
          <div class="cp-prompt" onclick="location.href='create-post.html'">Hôm nay bạn thế nào?</div>
        </div>
        <div class="cp-actions">
          <button class="cp-btn cp-photo" onclick="location.href='create-post.html'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="2"/><path d="M5 19l5-5 3 3 3-3 3 3"/></svg>
            Ảnh
          </button>
          <button class="cp-btn cp-video" onclick="location.href='create-post.html'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="13" height="12" rx="2"/><path d="M16 10l5-3v10l-5-3z"/></svg>
            Video
          </button>
        </div>
      </div>

      <!-- Bài đăng -->
      <div class="post">
        <div class="ph">
          <div class="av">R</div>
          <div>
            <div class="nm">rtetetet</div>
            <div class="meta">9 giờ trước
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><circle cx="16" cy="8" r="3"/><path d="M2 19c0-3 2.5-4.5 5.5-4.5"/><path d="M22 19c0-3-2.5-4.5-5.5-4.5"/></svg>
            </div>
          </div>
          <div class="more" onclick="openSheet('optSheet')">&#8943;</div>
        </div>
        <div class="txt">Video tets</div>
        <div class="media">
          <div class="play"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div>
        </div>
        <div class="pfoot">
          <span class="a"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21C5 14.5 3 11 3 8a4.5 4.5 0 018-2.8A4.5 4.5 0 0121 8c0 3-2 6.5-9 13z"/></svg> Thích</span>
          <span class="a" onclick="openSheet('cmtSheet')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.5 8.5 0 01-12.4 7.5L3 21l2-5.6A8.5 8.5 0 1121 11.5z"/></svg> Bình luận</span>
        </div>
      </div>

      <!-- Bài đăng chỉ có ảnh (không có nội dung) -->
      <div class="post">
        <div class="ph">
          <div class="av" style="background:linear-gradient(135deg,#3A1C5A,#7B2FF7)">200</div>
          <div>
            <div class="nm">account001</div>
            <div class="meta">1 ngày trước
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><circle cx="16" cy="8" r="3"/><path d="M2 19c0-3 2.5-4.5 5.5-4.5"/><path d="M22 19c0-3-2.5-4.5-5.5-4.5"/></svg>
            </div>
          </div>
          <div class="more" onclick="openSheet('optSheet')">&#8943;</div>
        </div>
        <div class="media" style="margin-top:12px;background:linear-gradient(135deg,#8bd17c,#4a8f3c)">
          <svg viewBox="0 0 24 24" width="64" height="64" fill="rgba(255,255,255,.7)"><rect x="3" y="4" width="18" height="16" rx="2" fill="none" stroke="rgba(255,255,255,.7)" stroke-width="1.6"/><circle cx="9" cy="10" r="2"/><path d="M5 19l5-5 4 4 3-3 3 3z"/></svg>
        </div>
        <div class="pfoot">
          <span class="a"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21C5 14.5 3 11 3 8a4.5 4.5 0 018-2.8A4.5 4.5 0 0121 8c0 3-2 6.5-9 13z"/></svg> Thích</span>
          <span class="a" onclick="openSheet('cmtSheet')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.5 8.5 0 01-12.4 7.5L3 21l2-5.6A8.5 8.5 0 1121 11.5z"/></svg> Bình luận</span>
        </div>
      </div>

    </div>

    <!-- Bottom tab -->
    <nav class="bottom-tab">
      <div class="tab-item" onclick="location.href='messages.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M4 4h16v12H7l-3 3z"/></svg>
        Tin nhắn
      </div>
      <div class="tab-item" onclick="location.href='contacts.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.5"/><path d="M2.5 20c0-3.6 2.9-5.5 6.5-5.5s6.5 1.9 6.5 5.5"/><path d="M16 5a3.5 3.5 0 010 6"/><path d="M18 14.5c2.6.4 4 2 4 5.5"/></svg>
        Danh bạ
      </div>
      <div class="tab-item active">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/><path d="M9 15l1.5-4.5L15 9l-1.5 4.5z" fill="#fff"/></svg>
        Bản tin
      </div>
      <div class="tab-item" onclick="location.href='account.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg>
        Cá nhân
      </div>
    </nav>

  </div>

  <!-- Overlay chung -->
  <div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>

  <!-- Sheet: tuỳ chọn bài đăng -->
  <div class="sheet" id="optSheet">
    <div class="opt-item" onclick="closeSheet()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 018 0"/></svg>
      Chỉnh sửa quyền xem <span class="chev">›</span>
    </div>
    <div class="opt-item" onclick="location.href='create-post.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/></svg>
      Chỉnh sửa bài đăng <span class="chev">›</span>
    </div>
    <div class="opt-item danger" onclick="closeSheet()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M9 7V4h6v3"/><path d="M6 7l1 13h10l1-13"/></svg>
      Xoá bài đăng
    </div>
  </div>

  <!-- Sheet: bình luận -->
  <div class="sheet cmt-sheet" id="cmtSheet">
    <h3>rtetetet đã đăng <button class="close" onclick="closeSheet()">&times;</button></h3>
    <div class="cmt-empty">Chưa có bình luận</div>
    <div class="cmt-input">
      <div class="av">R</div>
      <input class="fld" type="text" placeholder="Viết bình luận..." />
      <button class="send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="19" y2="12"/><path d="M13 6l6 6-6 6"/></svg></button>
    </div>
  </div>

<script src="assets/js/feed.js"></script>
</body>
</html>
