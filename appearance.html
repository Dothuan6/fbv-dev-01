<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FBV.ONE — Giao diện và ngôn ngữ</title>
<link rel="stylesheet" href="styles.css" />
<style>
  .ap-body{background:var(--bg-base);min-height:100vh;display:flex;justify-content:center}
  .ap-screen{width:100%;max-width:480px;min-height:100vh;background:var(--bg-base);display:flex;flex-direction:column}

  .ap-header{display:flex;align-items:center;gap:16px;padding:14px var(--screen-padding)}
  .ap-header .back{background:none;border:none;cursor:pointer;color:var(--text-primary);display:flex;padding:0}
  .ap-header .back svg{width:26px;height:26px}
  .ap-header .ttl{font-size:22px;font-weight:700;color:var(--text-primary)}

  .ap-list{padding:8px var(--screen-padding)}
  .ap-row{display:flex;align-items:center;gap:14px;padding:18px 0;border-bottom:1px solid var(--border);cursor:pointer}
  .ap-row:last-child{border-bottom:none}
  .ap-row .t{flex:1;font-size:18px;color:var(--text-primary)}
  .ap-row .v{font-size:17px;color:var(--text-secondary)}
  .ap-row .chev{color:var(--text-secondary);font-size:22px}

  /* Sheet radio */
  .opt-item{display:flex;align-items:center;padding:18px var(--screen-padding);font-size:18px;color:var(--text-primary);cursor:pointer;border-bottom:1px solid var(--border)}
  .opt-item:last-child{border-bottom:none}
  .opt-item span:first-child{flex:1}
  .radio{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);position:relative;flex:none}
  .opt-item.sel .radio{border-color:var(--primary)}
  .opt-item.sel .radio::after{content:"";position:absolute;inset:4px;border-radius:50%;background:var(--primary)}
</style>
</head>
<body class="ap-body">
  <div class="ap-screen">

    <!-- Header -->
    <header class="ap-header">
      <button class="back" aria-label="Quay lại" onclick="location.href='settings.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="ttl">Giao diện và ngôn ngữ</div>
    </header>

    <div class="ap-list">
      <div class="ap-row" onclick="openSheet('fontSheet')">
        <span class="t">Thay đổi kiểu chữ</span>
        <span class="v" id="fontVal">Mặc định</span>
        <span class="chev">›</span>
      </div>
      <div class="ap-row" onclick="openSheet('langSheet')">
        <span class="t">Thay đổi ngôn ngữ</span>
        <span class="v" id="langVal">Tiếng Việt</span>
        <span class="chev">›</span>
      </div>
    </div>

  </div>

  <!-- Overlay + sheets -->
  <div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>

  <div class="sheet" id="fontSheet">
    <h3>Thay đổi kiểu chữ</h3>
    <div class="opt-item sel" onclick="pick('font','Mặc định',this)"><span>Mặc định</span><span class="radio"></span></div>
    <div class="opt-item" onclick="pick('font','Inter',this)"><span>Inter</span><span class="radio"></span></div>
    <div class="opt-item" onclick="pick('font','Roboto',this)"><span>Roboto</span><span class="radio"></span></div>
  </div>

  <div class="sheet" id="langSheet">
    <h3>Thay đổi ngôn ngữ</h3>
    <div class="opt-item sel" onclick="pick('lang','Tiếng Việt',this)"><span>Tiếng Việt</span><span class="radio"></span></div>
    <div class="opt-item" onclick="pick('lang','Tiếng Anh',this)"><span>Tiếng Anh</span><span class="radio"></span></div>
  </div>

<script>
  function openSheet(id){ document.getElementById('overlay').classList.add('show'); document.getElementById(id).classList.add('show'); }
  function closeSheet(){ document.getElementById('overlay').classList.remove('show'); document.querySelectorAll('.sheet').forEach(function(s){ s.classList.remove('show'); }); }
  function pick(kind, label, el){
    el.parentNode.querySelectorAll('.opt-item').forEach(function(o){ o.classList.remove('sel'); });
    el.classList.add('sel');
    document.getElementById(kind === 'font' ? 'fontVal' : 'langVal').textContent = label;
    closeSheet();
  }
</script>
</body>
</html>
