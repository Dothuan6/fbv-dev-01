<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FBV.ONE — Giao diện và ngôn ngữ</title>
<link rel="stylesheet" href="assets/css/styles.css" />
<link rel="stylesheet" href="assets/css/appearance.css" />
</head>
<body class="ap-body">
  <div class="ap-screen">

    <!-- Header -->
    <header class="ap-header">
      <button class="back" aria-label="Quay lại" onclick="location.href='settings.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="ttl">Giao diện và ngôn ngữ</div>
    </header>

    <div class="ap-list">
      <div class="ap-row" onclick="openSheet('fontSheet')">
        <span class="t">Thay đổi kiểu chữ</span>
        <span class="v" id="fontVal">Mặc định</span>
        <span class="chev">›</span>
      </div>
      <div class="ap-row" onclick="openSheet('langSheet')">
        <span class="t">Thay đổi ngôn ngữ</span>
        <span class="v" id="langVal">Tiếng Việt</span>
        <span class="chev">›</span>
      </div>
    </div>

  </div>

  <!-- Overlay + sheets -->
  <div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>

  <div class="sheet" id="fontSheet">
    <h3>Thay đổi kiểu chữ</h3>
    <div class="opt-item sel" onclick="pick('font','Mặc định',this)"><span>Mặc định</span><span class="radio"></span></div>
    <div class="opt-item" onclick="pick('font','Inter',this)"><span>Inter</span><span class="radio"></span></div>
    <div class="opt-item" onclick="pick('font','Roboto',this)"><span>Roboto</span><span class="radio"></span></div>
  </div>

  <div class="sheet" id="langSheet">
    <h3>Thay đổi ngôn ngữ</h3>
    <div class="opt-item sel" onclick="pick('lang','Tiếng Việt',this)"><span>Tiếng Việt</span><span class="radio"></span></div>
    <div class="opt-item" onclick="pick('lang','Tiếng Anh',this)"><span>Tiếng Anh</span><span class="radio"></span></div>
  </div>

<script src="assets/js/appearance.js"></script>
</body>
</html>
