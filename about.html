<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FBV.ONE — Thông tin về Chatting App</title>
<link rel="stylesheet" href="styles.css" />
<style>
  .ab-body{background:var(--bg-base);min-height:100vh;display:flex;justify-content:center}
  .ab-screen{width:100%;max-width:480px;min-height:100vh;background:var(--bg-base);display:flex;flex-direction:column}

  .ab-header{display:flex;align-items:center;gap:16px;padding:14px var(--screen-padding)}
  .ab-header .back{background:none;border:none;cursor:pointer;color:var(--text-primary);display:flex;padding:0}
  .ab-header .back svg{width:26px;height:26px}
  .ab-header .ttl{font-size:22px;font-weight:700;color:var(--text-primary)}

  .ab-content{padding:8px var(--screen-padding)}
  .ab-desc{background:var(--bg-subtle);border-radius:14px;padding:18px;font-size:17px;line-height:1.6;color:var(--text-secondary);margin-bottom:24px}

  .ab-ver{display:flex;align-items:center;padding:16px 0;border-bottom:1px solid var(--border)}
  .ab-ver .l{flex:1;font-size:17px;color:var(--text-secondary)}
  .ab-ver .v{font-size:17px;font-weight:600;color:var(--text-primary)}

  .ab-row{display:flex;align-items:center;padding:18px 0;border-bottom:1px solid var(--border);cursor:pointer}
  .ab-row:last-child{border-bottom:none}
  .ab-row .t{flex:1;font-size:18px;color:var(--text-primary)}
  .ab-row .chev{color:var(--text-secondary);font-size:22px}
</style>
</head>
<body class="ab-body">
  <div class="ab-screen">

    <!-- Header -->
    <header class="ab-header">
      <button class="back" aria-label="Quay lại" onclick="location.href='settings.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="ttl">Thông tin về Chatting App</div>
    </header>

    <div class="ab-content">
      <div class="ab-desc">Chatting App giúp bạn giữ liên lạc, trò chuyện và quản lý tài khoản dễ dàng hơn trong một không gian an toàn, quen thuộc.</div>

      <div class="ab-ver"><span class="l">Phiên bản</span><span class="v">1.3.8 + 40</span></div>

      <div class="ab-row" onclick="location.href='terms.html'"><span class="t">Điều khoản</span><span class="chev">›</span></div>
      <div class="ab-row" onclick="location.href='terms.html'"><span class="t">Chính sách quyền riêng tư</span><span class="chev">›</span></div>
      <div class="ab-row" onclick="alert('Hỗ trợ')"><span class="t">Hỗ trợ</span><span class="chev">›</span></div>
    </div>

  </div>
</body>
</html>
