<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FBV.ONE — Nhập mật khẩu</title>
<link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="auth-body">

  <!-- Brand panel (desktop) -->
  <section class="brand-panel">
    <div class="logo-mark"><div class="core"><span></span></div></div>
    <div class="wordmark">FBV.ONE</div>
    <p class="tagline">Kết nối tức thì — nhắn tin, gọi thoại và video an toàn trên mọi thiết bị.</p>
  </section>

  <!-- Form panel -->
  <section class="form-panel">
    <div class="card">
      <button class="back-btn" aria-label="Quay lại" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1C1C1E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <h1 class="title">Nhập mật khẩu</h1>

      <form onsubmit="return false">
        <div class="input-group">
          <div class="pw-wrap">
            <input class="field" type="password" id="pw" placeholder="Nhập mật khẩu" />
            <button type="button" class="pw-toggle" id="pwToggle" aria-label="Hiện/ẩn mật khẩu" onclick="togglePw()">
              <svg id="eyeIcon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/><line x1="3" y1="3" x2="21" y2="21"/>
              </svg>
            </button>
          </div>
        </div>

        <a href="reset-link.html" class="link">Quên mật khẩu?</a>

        <button class="btn btn-primary" onclick="window.location.href='messages.html'">Đăng nhập</button>
      </form>
    </div>
  </section>

<script src="assets/js/password.js"></script>
</body>
</html>
