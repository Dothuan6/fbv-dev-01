<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FBV.ONE — Đã gửi liên kết đổi mật khẩu</title>
<link rel="stylesheet" href="assets/css/styles.css" />
<link rel="stylesheet" href="assets/css/password-sent.css" />
</head>
<body class="ps-body">
  <div class="ps-screen">

    <header class="ps-header">
      <button class="back" aria-label="Quay lại" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
    </header>

    <div class="ps-content">
      <h1 class="ps-title">Đã gửi liên kết đổi mật khẩu</h1>
      <p class="ps-text">Chúng tôi đã gửi liên kết đổi mật khẩu đến email <span class="ps-email" id="psEmail">thuann6222@gmail.com</span></p>
      <p class="ps-text">Vui lòng kiểm tra hộp thư và nhấn vào liên kết để hoàn tất thay đổi mật khẩu</p>

      <div class="ps-resend">
        <span class="cap">Bạn không nhận được mã xác thực?</span>
        <span class="cd" id="psResend">Gửi lại mã (120s)</span>
      </div>
    </div>

  </div>

  <script src="assets/js/toast.js"></script>
  <script>
    (function(){
      var el = document.getElementById('psResend'), n = 120, timer;
      function tick(){
        if(n > 0){ el.textContent = 'Gửi lại mã (' + n + 's)'; el.classList.remove('active'); n--; }
        else { el.textContent = 'Gửi lại mã'; el.classList.add('active'); clearInterval(timer); }
      }
      tick(); timer = setInterval(tick, 1000);
      el.addEventListener('click', function(){
        if(n > 0) return;
        n = 120; tick(); clearInterval(timer); timer = setInterval(tick, 1000);
        if(window.showToast) showToast('Đã gửi lại liên kết đổi mật khẩu');
      });
    })();
  </script>
</body>
</html>
