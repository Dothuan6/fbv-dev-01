<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FBV.ONE — Đăng bài</title>
<link rel="stylesheet" href="assets/css/styles.css" />
<link rel="stylesheet" href="assets/css/create-post.css" />
</head>
<body class="cp-body">
  <div class="cp-screen">

    <!-- Header -->
    <header class="cp-header">
      <button class="x" aria-label="Đóng" onclick="history.back()">&times;</button>
      <div class="cp-priv" onclick="openSheet()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><circle cx="16" cy="8" r="3"/><path d="M2 19c0-3 2.5-4.5 5.5-4.5"/><path d="M22 19c0-3-2.5-4.5-5.5-4.5"/></svg>
        <span id="privLabel">Tất cả bạn bè</span>
        <span class="cv">▾</span>
      </div>
      <button class="cp-post" id="postBtn" onclick="history.back()">Đăng</button>
    </header>

    <!-- Vùng soạn -->
    <div class="cp-area">
      <textarea id="ta" maxlength="2000" placeholder="Bạn đang nghĩ gì?" oninput="count()"></textarea>
      <div class="cp-count"><span id="num">0/2000</span><span class="small" id="left">Còn 2000 ký tự</span></div>
    </div>

    <!-- Công cụ -->
    <div class="cp-tools">
      <button class="cp-tool t-photo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="2"/><path d="M5 19l5-5 3 3 3-3 3 3"/></svg>
        Ảnh
      </button>
      <button class="cp-tool t-video">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="13" height="12" rx="2"/><path d="M16 10l5-3v10l-5-3z"/></svg>
        Video
      </button>
    </div>
  </div>

  <!-- Sheet quyền xem -->
  <div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>
  <div class="sheet" id="privSheet">
    <h3>Quyền xem bài đăng</h3>
    <div class="opt-item" onclick="pick('Tất cả bạn bè', this)">
      <span>Tất cả bạn bè</span>
      <svg class="ck" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5 9-11"/></svg>
    </div>
    <div class="opt-item" onclick="pick('Mình tôi', this)">
      <span>Mình tôi</span>
      <svg class="ck" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="visibility:hidden"><path d="M5 12l5 5 9-11"/></svg>
    </div>
  </div>

<script src="assets/js/toast.js"></script>
<script src="assets/js/create-post.js"></script>
</body>
</html>
