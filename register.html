<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FBV.ONE — Đăng ký</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-body">

  <!-- Brand panel (desktop) -->
  <section class="brand-panel">
    <div class="logo-mark"><div class="core"><span></span></div></div>
    <div class="wordmark">FBV.ONE</div>
    <p class="tagline">Tạo tài khoản để bắt đầu nhắn tin, gọi thoại và video an toàn.</p>
  </section>

  <!-- Form panel -->
  <section class="form-panel">
    <div class="card">
      <button class="back-btn" aria-label="Quay lại" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1C1C1E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <h1 class="title">Nhập số điện thoại / Email</h1>

      <div class="tabs">
        <div class="tab active" data-tab="email" onclick="switchTab('email')">Email</div>
        <div class="tab" data-tab="phone" onclick="switchTab('phone')">Điện thoại</div>
      </div>

      <form onsubmit="return false">
        <div class="input-group" id="emailGroup">
          <input class="field" type="email" id="emailInput" placeholder="Vui lòng nhập email" oninput="validate()" />
        </div>

        <div class="input-group" id="phoneGroup" style="display:none">
          <div class="phone-row">
            <div class="cc">+84 <span style="font-size:12px">▾</span></div>
            <input class="field" type="tel" id="phoneInput" placeholder="Vui lòng nhập số điện thoại" oninput="validate()" />
          </div>
        </div>

        <div class="terms">
          <input type="checkbox" id="agree" onchange="validate()" />
          <label for="agree">Tôi đồng ý với các điều khoản sử dụng <a href="terms.html">ChattingCTT</a></label>
        </div>

        <button class="btn btn-primary" id="nextBtn" disabled onclick="goNext()">Tiếp theo</button>
        <a href="login.html" class="btn btn-secondary btn-link">Đăng nhập ngay</a>
      </form>

      <div class="bottom-block">
        <div class="divider">Hoặc</div>

        <button class="btn-social">
          <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Tiếp tục với Google
        </button>
        <button class="btn-social">
          <svg viewBox="0 0 24 24" fill="#000"><path d="M16.36 1.43c.06 1.06-.34 2.1-1.02 2.86-.7.78-1.84 1.38-2.93 1.3-.08-1.04.4-2.12 1.05-2.82.72-.78 1.97-1.36 2.9-1.34zM20.5 17.2c-.55 1.27-.82 1.84-1.53 2.97-.99 1.57-2.39 3.53-4.12 3.54-1.54.02-1.93-1-4.02-.99-2.09.01-2.52 1.01-4.06.99-1.73-.02-3.05-1.78-4.04-3.35C-.07 16.9-.36 11.86 1.36 9.18c1.06-1.66 2.73-2.63 4.3-2.63 1.6 0 2.6 1.04 3.93 1.04 1.29 0 2.07-1.05 3.93-1.05 1.4 0 2.88.76 3.94 2.08-3.46 1.9-2.9 6.84.04 8.58z"/></svg>
          Tiếp tục với Apple
        </button>
      </div>
    </div>
  </section>

<script>
  var currentTab = 'email';

  function switchTab(t){
    currentTab = t;
    document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active', el.dataset.tab===t));
    document.getElementById('emailGroup').style.display = t==='email' ? '' : 'none';
    document.getElementById('phoneGroup').style.display = t==='phone' ? '' : 'none';
    validate();
  }

  // Bật nút "Tiếp theo" khi đã nhập email/SĐT và tích đồng ý điều khoản
  function validate(){
    var agreed = document.getElementById('agree').checked;
    var val = currentTab === 'email'
      ? document.getElementById('emailInput').value.trim()
      : document.getElementById('phoneInput').value.trim();
    document.getElementById('nextBtn').disabled = !(val && agreed);
  }

  function goNext(){
    if(document.getElementById('nextBtn').disabled) return;
    // SĐT → xác thực OTP; Email → thiết lập mật khẩu
    window.location.href = currentTab === 'phone' ? 'otp.html' : 'set-password.html';
  }
</script>
</body>
</html>
