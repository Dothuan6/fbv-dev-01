<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FBV.ONE — Cuộc gọi</title>
<link rel="stylesheet" href="styles.css" />
<style>
  .call-body{min-height:100vh;display:flex;justify-content:center;background:#1877F2}
  .call-screen{
    width:100%;max-width:480px;min-height:100vh;color:#fff;
    display:flex;flex-direction:column;align-items:center;
    padding:48px var(--screen-padding) 40px;text-align:center;
    background:linear-gradient(180deg,#2E8BF0 0%,#1877F2 45%,#0A66FF 100%);
  }
  .call-type{font-size:18px;font-weight:600;letter-spacing:.3px}

  .call-avatar{
    width:180px;height:180px;border-radius:50%;margin:64px 0 36px;
    background:linear-gradient(135deg,#3A1C5A,#7B2FF7);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:40px;font-weight:700;
    box-shadow:0 0 0 0 rgba(255,255,255,.35);animation:ring 1.8s ease-out infinite;
  }
  @keyframes ring{
    0%{box-shadow:0 0 0 0 rgba(255,255,255,.35)}
    70%{box-shadow:0 0 0 26px rgba(255,255,255,0)}
    100%{box-shadow:0 0 0 0 rgba(255,255,255,0)}
  }

  .call-name{font-size:42px;font-weight:700;line-height:1.1}
  .call-status{font-size:20px;color:rgba(255,255,255,.8);margin-top:14px}

  /* Hàng điều khiển */
  .call-controls{margin-top:auto;display:flex;gap:28px;justify-content:center;align-items:flex-end;flex-wrap:wrap}
  .ctrl{display:flex;flex-direction:column;align-items:center;gap:8px;font-size:14px;color:#fff;cursor:pointer;background:none;border:none}
  .ctrl .ic{
    width:62px;height:62px;border-radius:50%;background:rgba(255,255,255,.18);
    display:flex;align-items:center;justify-content:center;transition:.15s;
  }
  .ctrl .ic svg{width:26px;height:26px;color:#fff}
  .ctrl.active .ic{background:#fff}
  .ctrl.active .ic svg{color:var(--primary)}
  .ctrl:hover .ic{background:rgba(255,255,255,.28)}

  .ctrl.end .ic{background:#F0473E}
  .ctrl.end .ic svg{transform:rotate(135deg)}
  .ctrl.end:hover .ic{background:#e23b32}
</style>
</head>
<body class="call-body">
  <div class="call-screen">

    <div class="call-type" id="callType">Cuộc gọi đi</div>

    <div class="call-avatar" id="avatar">200</div>
    <div class="call-name" id="callName">account001</div>
    <div class="call-status">Đang đổ chuông</div>

    <div class="call-controls">
      <button class="ctrl" id="muteBtn" onclick="toggle(this)">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0014 0"/><line x1="12" y1="18" x2="12" y2="22"/></svg></span>
        Tắt tiếng
      </button>

      <button class="ctrl" id="camBtn" onclick="toggle(this)" style="display:none">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="13" height="12" rx="2"/><path d="M16 10l5-3v10l-5-3z"/></svg></span>
        Camera
      </button>

      <button class="ctrl" id="spkBtn" onclick="toggle(this)">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6h4l5 4V5L8 9z"/><path d="M16 9a3 3 0 010 6"/><path d="M18.5 7a6.5 6.5 0 010 10"/></svg></span>
        Loa ngoài
      </button>

      <button class="ctrl end" onclick="endCall()">
        <span class="ic"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg></span>
        Kết thúc
      </button>
    </div>

  </div>

<script>
  var params = new URLSearchParams(location.search);
  var type = params.get('type') || 'voice';      // voice | video
  var name = params.get('name') || 'account001';

  document.getElementById('callName').textContent = name;
  if(type === 'video'){
    document.getElementById('callType').textContent = 'Cuộc gọi video đi';
    document.getElementById('camBtn').style.display = '';   // hiện nút camera cho video
    document.getElementById('camBtn').classList.add('active');
  }

  function toggle(btn){ btn.classList.toggle('active'); }
  function endCall(){
    if(history.length > 1) history.back();
    else window.location.href = 'chat.html';
  }
</script>
</body>
</html>
